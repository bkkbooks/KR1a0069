body:
  text: 易附録纂注卷十四元胡一桂撰擇地潔處為蓍室南户置牀於室中央牀大約長五尺廣三尺毋太近壁蓍五十莖韜以纁帛貯以皂囊納之櫝中置於牀北櫝以竹筒或堅木或布漆為之圓徑三寸如蓍之長半為底半為蓋下别為臺函之使不偃仆附録蒿固非蓍然亦猶是其類若以木碁行算金錢當之則其去蓍益逺矣答曽三異設木格於櫝南居牀二分之北格以橫木板為之髙一尺長竟牀當中為兩大刻相距一尺大刻之西為三小刻相距各五寸許下施橫足側立案上置香爐一於格南香合一於爐南日炷香致敬將筮則灑掃拂拭滌硯一注水及筆一墨一黃漆板一於爐東東上筮者齊潔衣冠北面盥手焚香致敬筮者北面見儀禮若使人筮則主人焚香畢少退北面立筮者進立於牀前少西南向受命主人直述所占之事筮者許諾主人右還西向立筮者右還北向立兩手奉櫝蓋置於格南爐北出蓍於櫝去囊解韜置於櫝東合五十策兩手執之熏於爐上此後所用蓍策之數其説並見啓蒙命之曰假爾泰筮有常假爾泰筮有常某官姓名今以某事云云未知可否爰質所疑於神於靈吉凶得失悔吝憂虞惟爾有神尚明告之乃以右手取其一策反於櫝中而以左右手中分四十九䇿置格之左右兩大刻此第一營所謂分而為二以象兩者也次以左手取左大刻之䇿執之而以右手取右大刻之一策挂於左手之小指間此第二營所謂挂一以象三者也次以右手四揲左手之策此第三營之半所謂揲之以四以象四時者也次歸其所餘之䇿或一或二或三或四而扐之左手無名指間此第四營之半所謂歸竒於扐以象閏者也次以右手反過揲之䇿於左大刻遂取右大刻之策執之而以左手四揲之此第三營之半次歸其所餘之策如前而扐之左手中指之間此第四營之半所謂再扐以象再閏者也一變所餘之䇿左一則右必三左二則右亦二左三則右必一左四則右亦四通挂一之策不五則九五以一其四而為竒九以兩其四而為偶竒者三而偶者一也次以右手反過揲之䇿於右大刻而合左手一挂二扐之策置於格上第一小刻以東為上後放此是為一變再以兩手取左右大刻之蓍合之或四十四策或四十策復四營如第一變之儀而置其挂扐之策於格上第二小刻是為二變二變所餘之策左一則右必二左二則右必一左三則右必四左四則右必三通挂一之策不四則八四以一其四而為竒八以兩其四而為偶竒偶各得四之二焉又再取左右大刻之蓍合之或四十策或三十六䇿或三十二策履四營如第二變之儀而置其挂扐之䇿於格上第三小刻是為三變三變餘䇿與二變同三變既畢乃視其三變所得挂扐過揲之䇿而畫其爻於版挂扐之數五四為竒九八為偶挂扐三竒合十三䇿則過揲三十六䇿而為老陽其畫為口所謂重也挂扐兩竒一偶合十七䇿則過揲三十二䇿而為少隂其畫為一所謂拆也挂扐兩偶一竒合二十一䇿則過揲二十八策而為少陽其畫為一所謂單也挂扐三偶合二十五策則過揲二十四策而為老隂其畫為乂所謂交也附録交者拆之聚故為老隂重者單之積故為老陽如是每三變而成爻第一第四第七第十第十三第十六凡六變並同但第三變以下不命而但用四十九蓍耳第二第五第八第十一第十四第十七凡六變亦同第三第六第九第十二第十五第十八凡六變亦同凡十有八變而成卦乃考其卦之變而占其事之吉凶卦變别有圖説見啓蒙禮畢韜蓍襲之以囊入櫝加蓋斂筆研墨版再焚香致敬而退如使人筮則主人焚香揖筮者而退易附録纂注卷十四
