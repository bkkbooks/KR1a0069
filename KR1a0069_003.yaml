body:
  text: 易附録纂注卷三元胡一桂撰彖即文王所繫之辭上者經之上篇傳者孔子所以釋經之辭也後凡言傳者放此附録彖辭極精説得卦中情狀最出分明是聖人所作道夫大哉乾元萬物資始乃統天此専以天道明乾義又析元亨利貞為四德以發明之而此一節首釋元義也大哉嘆辭元大也始也乾元天德之大始故萬物之生皆資之以為始也又為四德之首而貫乎天德之始終故曰統天附録乾者萬物之始對坤而言天地之道也元者萬物之始對亨利貞而言四時之序也答連嵩卿萬物資始與資之深資於事父以事君之資皆訓取字淵問乾元統天曰乾元只是天之性情不是兩箇物事如人之精神豈可謂人自是人精神自是精神乎輝纂注蔡氏曰天道流行雖有元亨利貞之分而其所以無間斷者實惟一元之運行故曰統天程子曰四德之元猶五常之仁偏言則一事専言則包四者雲行雨施品物流形此釋乾之亨也纂注蔡氏曰雲行雨施亨之見乎氣也品物流形亨之見乎形也大明終始六位時成時乘六龍以御天始即元也終即貞也不終則無始不貞則無以為元也此言聖人大明乾道之終始則見卦之六位各以時成而乘此六陽以行天道是乃聖人之元亨也附録這段易傳説得不分曉語録中有一段却分曉乃是楊遵道所録云人能大明天道之終始這處下箇人字是緊切底字淵天人一理人之動乃天之運也然以私意而動則人而非天矣惟其潛見飛躍各得其時則是以人當天也然不言當天而言御天以見遲速進退之在我爾雖云在我然心理合一初無二體但主心而言爾答方士繇乾道終始即四德也始即元終即貞六爻之位由此而立耳以時成者言各以其時而成潛見飛躍皆以時耳然皆四德之流行也初九九二之半即所謂元九二之半與九三即所謂亨九四與九五之半即所謂利九五之半與上九即所謂貞蓋聖人大明乾道之終始故見六位各以時成乘此六位之時以當天運而四德之所以終而復始應變而不窮也銖這一段説聖人之元亨六位六龍只與譬喻相似聖人之六位如隱顯進退行藏潛龍時便當隱去見龍時便是他出來如孔子為魯司寇時便是他大故顯了到那獲麟絶筆便是他亢龍時這是在下之聖人然這卦大槩是説那聖人得位底若使聖人在下亦自有個元亨利貞如首出庶物不必在上方如此如孔子出類拔萃便是首出庶物著書立言澤及後世便是萬國咸寧淵乾道變化各正性命保合大和乃利貞變者化之漸化者變之成物所受為性天所賦為命大和隂陽會合沖和之氣也各正者得於有生之初保合者全於己生之後此言乾道變化無所不利而萬物各得其性命以自全以釋利貞之義也附録變者化之漸化者變之成如昨日是夏今日立秋為變到那全然天涼沒一些熱時是化輝如天命之謂性孟子道性善便是就人身上説性易之所言乃是説天人相接處各正性命底便是乾道變化底又曰性命便是當初合下分付底賜問保合大和乃利貞曰天之生物莫不各有箇軀殼如人之有體果實之有皮核有箇軀殼保合以全之則真性常存生生不窮如一粒之穀外面有箇殼以裹之方其發一萌芽之始是物之元也及其抽枝長葉則是物之亨到得生實欲成未成之際此便是利及其既實而堅此便是貞矣蓋乾道變化發生之始此是元也到各正性命小以遂其小大以遂其大則是亨矣能保合以全其太和之性則可利貞有開保合太和即是保合此生理也天地氤氲乃天地保合此生物之理及其萬物化生之後則萬物各自保合其生理不保合則無物矣輝首出庶物萬國咸寧聖人在上髙出於物猶乾道之變化也萬國居得其所而咸寧猶萬物之各正性命而保合太和也此言聖人之利貞也蓋嘗統而論之元者物之始生亨者物之暢茂利則向於實也貞則實之成也實之既成則其根蒂脫落可復種而生矣此四德之所以循環而無端也然而四者之間生氣流行初無間斷此元之所以包四德而統夫也其以聖人而言則孔子之意蓋以此卦為聖人得天位行天道而致太平之占也雖其文義有非文王之舊者然讀者各以其意求之則並行而不悖也坤卦放此附録首出庶物須是聰明睿知髙出庶物之上以君天下方得萬國咸寧禮記云聰明睿知足以有臨也須聰明睿知皆過於天下之人方可臨得他砥所謂大哉乾元萬物資始至哉坤元萬物資生那元字便是生物之仁資始是得其氣資生是成其形到得亨便是彰著利便是結聚貞便是收斂收斂既無形迹又須復生至如夜半子時猶未動在到寅卯便生已午便著申酉便結亥子丑便實及至寅又生他這箇只管運轉一嵗有一嵗之運一月有一月之運一日有一日之運一時有一時之運雖一息之微亦有四箇段子恁地運轉道夫四德之元専言之則全體生生之理也故足以包四者偏言之則指萬物之發端而已故止於一事淵元亨利貞四字文王本意在乾坤者只與屯等卦一般是大亨而利於貞爾至孔子作彖傳文言始以乾坤為四德而諸卦自如其舊二聖人之意非有不同蓋各自發明一理爾今學者且自當虛心玩味各隨本文之意而體會之其不同處自不妨不可遽以己意橫作主張答趙彥肅人只見夫子於乾坤文言解作四德他卦只云大亨以正便須要於乾坤四德説教大於他卦畢竟本皆占也又曰聖人作易本為卜筮然其辭固包義理在其中孔子恐人只於卜筮上求一向泥著方只以義理解之如乾卦元亨利貞文王之辭在占法又是二事云占得此純乾之卦者大亨以貞也大亨言其吉然所利者須是貞此為之戒辭也文言方解作四德至哉坤元萬物資生乃順承天此以地道明坤之義而首言元也至極也比大義差緩始者氣之始生者形之始順承天施地之道也附録總論乾元坤元徐渙云萬物資乾以始而有氣資坤以生而有形氣至而生生即坤元亦通淵資乾以始便資坤以生不爭得霎時坤之所生即乾之所始者纂注徐氏曰至哉贊坤元承乾元之大亦無不至也程子曰萬物資乾以始資坤以生父母之道也坤厚載物德合無疆含𢎞光大品物咸亨言亨也德合無疆謂配乾也纂注程子曰坤之德厚持載萬物合於乾之無疆者也含包容也𢎞寬裕也光昭明也大博厚也有此四德故能成天之功品物咸得亨遂蔡氏曰含𢎞坤之事也光大乾之事也德合乎乾故亦至乎光大也牝馬地類行地無疆柔順利貞君子攸行言利貞也馬乾之象而以為地類者牝隂物而馬又行地之物也行地無疆則順而健矣柔順利貞坤之德也君子攸行人之所行如坤之德也所行如是則其占如下文所云也先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶陽大隂小陽得兼隂隂不得兼陽故坤之德常減於乾之半也東北雖喪朋然反之西南則終有慶矣附録易中説到那陽處便扶助推移他到那隂處便抑遏壅絶他淵以文王八卦論之則自西北之乾以至東方之震皆父與三男之位也自東南之巽以至西方之兊皆母與三女之位也故彖辭以東北為陽方西南為隂方答袁樞乃終有慶既言終有慶則慶不在今為他是箇柔順底物東北陽方非他所安之地自是喪朋喪朋於東北則必反於西南是終有慶也正如先迷後得為他柔順故先迷柔順而不失乎健故後得所以卦下言牝馬之貞喪朋先迷便是牝有慶後得便是馬將牝馬字分開却形容得意思文蔚問大抵柔順中正底人做越常過分事不得只是循常守分時又却自做得他底事曰是如此文蔚安貞之吉應地無疆安而且貞地之德也纂注邱行可曰坤彖三無疆字其指各異德合無疆乾之無疆也行地無疆坤之無疆也應地無疆君子之無疆也無疆天德也惟地能合天之無疆則地亦無疆君子能法地之無疆則君子亦無疆然則君子法地地法天皆不出於一天德之無疆而已矣屯剛柔始交而難生以二體釋卦名義始交謂震難生謂坎附録剛柔始交只指震言所謂震一索而得男也銖始交謂震難生謂坎是楊龜山解必大動乎險中大亨貞以二體之德釋卦辭動震之為也險坎之地也自此以下釋元亨利貞乃用文王本意附録銖問自此以下釋元亨利貞乃用文王本意何也曰文王説元亨利貞只是説乾道大通而至正故筮得者其占當得大通而利於貞固至孔子方作四德説後人不知將謂文王作易便作四德説則非也如屯卦所謂元亨利貞者以其能動則可以亨而在險則宜守貞故筮得之者其占為大亨而利於貞初非謂德也故孔子釋此彖辭只曰動乎險中大亨貞是用文王本意釋之也銖雷雨之動滿盈天造草昧宜建侯而不寧以二體之象釋卦辭雷震象雨坎象天造猶言天運草雜亂昧冥晦也隂陽交而雷雨作雜亂冥晦塞乎兩間天下未定名分未明宜立君以統治而未可遽謂安寧之時也不取初九爻義者取義多端姑舉其一也附録雷雨之動滿盈亦是那鬱塞底意思淵天造草昧宜建侯而不寧孔子又是别發出一道理説當此擾攘之時不可無君故須立君砥不可道建侯便了須更自以為不安寧方可淵纂注蔡氏曰草萌地中未明之象總論彖傳邱行可曰彖傳大率於章首先釋卦名義次釋卦辭又次釋卦義有未盡者從而推廣之此彖傳之定例也其辭則雜取卦體卦象卦德卦變四者互明之卦體以兩體及六爻之義言如剛柔始交震而難生坎之類是也卦象以天地雷風山澤水火言如雷雨之動滿盈之類是也卦德以健順明險動入上説言如動乎險中之類是也卦變以剛柔往來上下言如柔來文剛分剛上而文柔之類是也自屯以下大要皆不越乎此矣蒙山下有險險而止蒙以卦象卦德釋卦名有兩義附録山下有險是卦象險而止是卦德蒙有二義險而止險在內止在外自家這裏先自不安穩了外面更去不得便是蒙昧之象若見險而能止則為蹇却是險在外自家這裏見去不得所以不去故曰知矣哉淵蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也以卦體釋卦辭也九二以可亨之道發人之蒙而又得其時之中謂如下文所指之事皆以亨行而當其可也志應者二剛明五柔暗故二不求五而五求二其志自相應也以剛中者以剛而中故能告而有節也瀆筮者二三則問者固瀆而告者亦瀆矣蒙以養正乃作聖之功所以釋利貞之義也附録問何以見當其可曰下文所謂二五以志相應而初筮則告之再三瀆則不告皆時中也初筮告以剛中者亦指九二有剛中之德故能告而有節即所謂以剛而中也銖蒙昧之時先自養教正當了到開發時便有作聖之功若蒙昧之中已自不正他日何由會有聖功淵纂注程子曰五之志應於二也賢者在下豈可自進以求於君茍自求之必無能信用之理古之人所以必待人君致敬盡禮而後往者非欲自為髙大蓋其尊德樂道不如是不足與有為也又曰未發之謂蒙以純一未發之蒙而養其正乃作聖之功也發而後禁則扞格而難勝養正於蒙學之至善也需須也險在前也剛健而不陷其義不困窮矣此以卦德釋卦名義纂注徐氏曰剛健謂乾陷謂坎惟剛健故不陷需有孚光亨貞吉位乎天位以正中也利涉大川往有功也以卦體及兩象釋卦辭附録以正中以中正也只一般只是要協韻淵訟上剛下險險而健訟以卦德釋卦名義纂注程子曰訟之為卦上剛下險險而又健也又為險健相接內險外健皆所以為訟也若健而不險不生訟也險而不健不能訟也險而又健是以訟也訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也以卦變卦體卦象釋卦辭附録問剛來而得中曰大抵上體是剛下體是柔一剛下而變柔則為剛來今訟之上體是純剛安得謂之剛來邪以某觀之訟卦本是遁卦變來遁之六二為訟之六三其九三却下而為九二乃為訟耳時舉銖問終凶訟不可成即本義所指卦體曰然纂注蔡氏曰剛來得中乾自外來交坤而為坎也諸卦言往來上下多主本卦剛柔相交而言如隨蠱賁渙之類是也惟訟與無妄上乾下坎震一剛自外來非由本卦來往故訟曰剛來無妄曰剛自外來師衆也貞正也能以衆正可以王矣此以卦體釋師貞之義以謂能左右之也一陽在下之中而五隂皆為所以也能以衆正則王者之師矣剛中而應行險而順以此毒天下而民從之吉又何咎矣又以卦體卦德釋大人吉無咎之義剛中謂九二應謂六五應之行險謂行危道順謂順人心此非有老成之德者不能也毒害也師旅之興不無害於天下然而以其有是才德是以民恱而從之也纂注徐氏曰剛中而應行險而順此為將之道蓋不剛則無威嚴而不足以服衆過剛則暴而無以懷之有剛中之才而信任不専亦不能有成功此師所以貴乎剛中而應也兵凶器戰危事不得已而興師動衆禁暴除亂此師所以貴乎行險而順也丈人吉無咎伊尹太公方叔元老文武吉甫足以當之漢趙充國唐郭子儀其庶幾乎愚謂險坎德順坤德比吉也此三字疑衍文比輔也下順從也此以卦體釋卦名義附録比輔也解比字下順從也解吉字原筮元永貞無咎以剛中也不寧方來上下應也後夫凶其道窮也亦以卦體釋卦辭剛中謂五上下謂五隂也纂注徐氏曰後夫凶如萬國朝禹而防風後至天下歸漢而田橫不來如隗囂公孫述之徒終何如哉道窮致凶所自取也通論蒙比卦邱行可曰蒙內卦坎為初筮彖釋之曰以剛中謂九二也比外卦坎為原筮原再也彖釋之曰以剛中謂九五也小畜柔得位而上下應之曰小畜以卦體釋卦名義柔得位指六居四上下謂五陽健而巽剛中而志行乃亨以卦德卦體而言陽猶可亨也纂注蔡氏曰剛中五也志行五與四合而小畜之志得行也密雲不雨尚往也自我西郊施未行也尚往言畜之未極其氣猶上進也附録密雲不雨尚往也蓋止是下氣上升所以未能雨必是上氣蔽蓋無發泄處方能有雨橫渠正蒙論風雷雲雨之説最分曉木之以隂畜陽三陽上往而隂畜不住所以不雨正如甑蒸飯漏氣則不成水無水淚下也輝纂注蔡氏曰尚往陽升而隂不能固也施未行未能降而為雨也履柔履剛也以二體釋卦名義説而應乎乾是以履虎尾不嘻人亨以卦德釋彖辭剛中正履帝位而不疚光明也又以卦體明之指九五也纂注程子曰九五以陽剛中正尊履帝位茍無疚病則履道之至善光明者也疚謂疵病夬履是也光明德盛而輝光也泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外隂內健而外順內君子而外小人君子道長小人道消也附録易之隂陽以天地自然之氣論之則不可相無以君子小人之象言之則聖人之意未嘗不欲天下之盡為君子而無小人也遇來教謂吾道無對不當與世俗較勝負此説美矣而亦非鄙意之所安也夫道固無對者也然其中却著不得許多異端邪説直須一一剔㔇出後方曉然見得箇精神純粹無對之道若和泥合水便只著箇無對包了切恐此無對中却多藏得病痛也孟子言楊墨之道不熄孔子之道不著而大易於君子小人之際其較量勝負尤為詳密豈其未知無對之道邪蓋無對之中有隂則有陽有善則有惡陽消則隂長君子進而小人退循環無窮初不害其為無對也答東萊隂陽各有一半聖人於泰否只為陽説道理看來聖人出來做須有一箇道理使得天下皆為君子世間人多言君子小人常相半不可太去治之急迫之却為害不然如舜湯舉臯陶伊尹不仁者逺自是小人皆不為非被君子夾持得皆革面做好人了砥聖人作易以立人極其義以君子為主故為君子謀而不為小人謀觀泰否剝復名卦之意可見矣而曰古今豈有無小人之國其不知易甚哉鄭公藝圃折衷辨天地之化不越乎一隂一陽兩端而已其性雖未嘗一日不相反然亦不可以一日而相無也聖人作易常以陽為君子而引翼扶持惟恐其不盛隂為小人排擯抑黜惟恐其不衰何哉蓋陽之德剛隂之德柔剛者常公柔者常私剛者常明柔者常暗剛者未嘗不正柔者未嘗不邪剛者未嘗不大柔者未嘗不小公明正大之人用於世則天下蒙其福私暗邪辟之人得其志則天下受其禍此理之必然也金華潘公文集序纂注丘行可曰三陽三隂之卦凡二十而言卦變者十有三泰否隨蠱噬嗑賁咸恆損益漸渙節是也聖人首以往來言於泰否者所以發卦變之凡例蓋泰否者乾坤二體之往來而他卦者乾坤之一爻由泰否而往來也否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下無邦也內隂而外陽內柔而外剛內小人而外君子小人道長君子道消也附録某看人也須是剛雖則是偏然較之柔不同易以陽剛為君子隂柔為小人若是柔弱不剛之質少間都不會振奮只會困倒了淵纂注程子曰天地之氣不交則萬物無生成之理上下之義不交則天下無邦國之道建邦國所以為治也上施政以治民艮戴君而從命上下相交所以治安也今上下不交是天下無邦國之道也蔡氏曰釋彖言隂陽者獨泰否兩卦而已否者氣藏乎質而不交故又以剛柔言同人柔得位得中而應乎乾曰同人以卦體釋卦名義柔謂六二乾謂九五同人曰衍文同人于野亨利涉大川乾行也文明以健中正而應君子正也唯君子為能通天下之志以卦德卦體釋卦辭通天下之志乃為大同不然則是私情之合而已何以致亨而利涉哉附録乾行也言須是這般剛健之人方做得這般事若是柔弱者如何會出去外面同人又去涉險淵纂注程子曰天下之志萬殊理則一也君子明理故能通天下之志聖人視億兆之心猶一心者通於理而已文明則能燭理故能明大同之義剛健則能克己故能盡大同之道然後能中正合乎乾行也大有柔得尊位大中而上下應之曰大有以卦體釋卦名義柔謂六五上下謂五陽其德剛健而文明應乎天而時行是以元亨以卦德卦體釋卦辭應天指六五也附録文是文章明是明著易中多言文明文明是二字廣纂注程子曰元者物之先也物之先豈有不善者乎事成而後有敗敗非先成者也興而後有衰衰固後於興也得而後有失非得何以有失也至於善惡治亂是非天下之事莫不皆然必善為先故文言曰元者善之長也謙亨天道下濟而光明地道卑而上行言謙之必亨天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也變謂傾壞流謂聚而歸之人能謙則其居尊者其德愈光其居卑者人亦莫能過此君子所以有終也附録問天道福善禍淫此理定否曰如何不定自是道理當如此賞善罰惡亦是理當如此不如此便是失其常理又問或有不如此者何也曰福善禍淫其常理也若不如此便是天也把捉不定了又曰天莫之為而為他亦何常有意只是理自是如此且如冬寒夏熱此是常理當如此若冬熱夏寒便是失其常理又曰變盈流謙揚子雲言山殺瘦澤增髙此是説山上土為水漂流下來山便瘦澤便髙淵鬼神言禍言福是有些造化之柄如言與鬼神合其吉凶到鬼神便説吉凶字淵天道是就寒暑往來説地道是就地形髙下説鬼神是就禍福上説各自主一事而言時舉謙之為義不知天地人鬼何以皆好尚之蓋太極中本無物若事業功勞又於我何有觀天地生物而不言所利可見矣賀孫以尊而行謙則其道光以卑而行謙則其德不可踰纂注蔡氏曰下濟而光明艮也艮有光明之象故艮之彖曰其道光明謂艮陽止乎上隂不得而掩之故光明卑而上行坤也虧盈益謙以日月隂陽言變盈流謙以山谷川澤言害盈福謙以災祥禍福言惡盈好謙以豫奪進退言程子曰謙者人之至德故聖人詳言之所以戒盈而勸謙也郭氏曰四者非有心如是其道自然故皆曰道愚謂下濟與卑謙義光明上行亨義艮一陽居上卦之下天道下濟而光明也坤三隂居下卦之上地道卑而上行也豫剛應而志行順以動豫以卦體卦德釋卦名義豫順以動故天地如之而況建侯行師乎以卦德釋卦辭纂注程子曰天地之道萬物之理惟至順而已大人所以先天後天而不違者亦順乎理而已天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉極言之而贊其大也附録刑罰不清民不服只為舉動不順了致得民不服便是徒配了他亦不服豫之時義言豫時底道理淵隨剛來而下柔動而説隨以卦變卦德釋卦名義附録凡卦皆從內説出去若説説而動却是自家説他後動不成隨了我動彼説此之謂隨也淵大亨貞無咎而天下隨時王肅本時作之今當從之釋卦辭言能如是則天下之所從也隨時之義大矣哉王肅本時字在之字下今當從之纂注蔡氏曰天下所隨者聖人之時而聖人制作又當隨天下之時禮樂法度始於伏羲成於周者豈聖人知慮有所不及哉此隨時之義所以大也蠱剛上而柔下巽而止蠱以卦體卦變卦德釋卦名義蓋如此則積弊而至於蠱矣附録問剛在上而柔在下為卦體下卑巽而上茍止所以為蠱此卦德自賁井既濟來皆剛上而柔下此卦變曰是銖剛上而柔下巽而止蠱此是言致蠱之由非治蠱之道必大大凡看易先看成卦之義險而健則成訟巽而止則成蠱艮上而巽下艮剛居上巽柔居下上髙亢而不下交下卑巽而不能救此所以蠱壞也巽而止只是巽順便止了更無所施為如何治蠱德明蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也釋卦辭治蠱至於元亨則亂而復治之象也亂之終治之始天運然也附録問蠱是壞亂之象雖亂極必治如何便會元亨曰亂極必治天道循環自是如此如五胡亂華以至於隋必有唐太宗者出又如五季必生太祖皇帝若不如此便無天道了所以彖曰蠱元亨而天下治也砥必須是大善亨通而後天下治淵互論蠱漸卦易要分內外卦看如巽而止則成蠱止而巽便不同蓋先止而後巽却是有根株了方巽將去故為漸必大臨剛浸而長以卦體釋卦名纂注徐氏曰浸漸也隂符經曰天地之道浸亦用此義言一氣不頓進一形不頓虧二陽長於下而漸進也説而順剛中而應又以卦德卦體言卦之善大亨以正天之道也當剛長之時又有此善故其占如此也至於八月有凶消不久也言雖天運之當然然君子宜知所戒附録總論彖辭剛浸而長已下三句解臨字大亨以正更是天之道也解元亨字須用説八月有凶者蓋要反那二陽説淵纂注徐氏曰隂陽消長若循環然彖易聖人深言消長之機其來甚速吉凶靡定禍福何常思患豫防君子所當戒懼也大觀在上順而巽中正以觀天下以卦體卦德釋卦名義纂注徐氏曰大剛也一剛在上下示衆柔故曰大觀在上順巽以卦德言中正五也大觀在上以位言順巽中正以德言有其位無其德不足以觀天下有其德無其位亦不足以觀天下觀盥而不薦有孚顒若下觀而化也釋卦辭纂注徐氏曰下觀而化以四隂觀二陽言謂上有精潔誠敬之德顒然可仰則天下有所觀感而化如舜恭己正南面而天下自治文王不大聲以色而萬邦作孚自然之感固如此也觀天之神道而四時不忒聖人以神道設教而天下服矣極言觀之道也四時不忒天之所以為觀也神道設教聖人之所以為觀也附録觀天之神道只是自然運行底道理四時自然不忒聖人以神道亦是説他有教人自然觀感處淵總論彖辭盥非灌之義盥本為薦而不薦是欲畜其誠意以觀示民使民觀感而化之義有孚顒若便是那下觀而化却不是説人君身上事聖人以神道設教是聖人不犯手做底即是盥而不薦之義順而巽中正以觀天下謂以此觀示之也頤中有物曰噬嗑以卦體釋卦名義噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也又以卦名卦體卦德二象卦變釋卦辭附録張洽問易中言剛柔分兩處一是噬嗑一是節此難解曰只是一卦三隂三陽謂之剛柔分曰易中三隂三陽卦多獨於此言之何也曰偶於此言之其他卦則别有義時舉愚謂下體本坤分初柔上而為五上體本乾分五剛下中而為初此剛柔分也柔得中而上行即初柔上行而得也噬嗑剛柔分而柔得中節剛柔分而剛得中故於兩卦發其義賁亨亨字疑衍柔來而文剛故亨分剛上而文柔故小利有攸往天文也以卦變釋卦辭剛柔之交自然之象故曰天文先儒説天文上當有剛柔交錯四字理或然也纂注蔡氏曰柔來而文剛二也坤下交乾而為離也分剛上而文柔上也乾上交坤而為艮也剛柔往來自然之文故曰天文文明以止人文也又以卦德言之止謂合得其分觀乎天文以察時變觀乎人文以化成天下極言賁道之大也纂注程子曰天文謂日月星辰之錯列寒暑往來之代變觀其運行以察四時之遷改也人文人理之倫序觀天文以教化天下成其禮俗乃聖人用賁之道也剝剝也柔變剛也以卦體釋卦名義言柔進于陽變剛為柔也不利有攸往小人長也順而止之觀象也君子尚消息盈虛天行也以卦體卦德釋卦辭纂注丘行可曰順而止之合二德言君子觀衆隂剝陽之象惟順時而止不敢輕進以冒小人之禍所以防其剝也然豈終止哉天道循環無往不復陽消而息隂盈而虛剝極於上則復反於下乃天運之當然也是以君子尚之此處剝之要道也復亨剛反剛反則亨附録問剛反當作一句曰然此二字是解復亨下云動而以順行是解出入無疾以下時舉動而以順行是以出入無疾朋來無咎以卦德而言反復其道七日來復天行也隂陽消息天運然也附録消長之道自然如此故曰天行處隂之極亂者復治往者復還凶者復吉危者復安天地自然之運也僴利有攸往剛長也以卦體而言既生則漸長矣復其見天地之心乎積隂之下一陽復生天地生物之心幾於滅息而至此乃復可見在人則為靜極而動惡極而善本心幾息而復見之端也程子論之詳矣而邵子詩亦曰冬至子之半天心無改移一陽初動處萬物未生時玄酒味方淡大音聲正希此言如不信更請問包羲至哉言也學者宜盡心焉附録問見天地之心曰復未見造化而造化之心於此可見可學問天地之心雖靜未嘗不流行何為必於復乃見天地之心曰三陽之時萬物蕃新只見物之盛大天地之心却不可見惟是一陽初復萬物未生冷冷靜靜而一陽既動生物之心闖然而見雖在積隂之中自掩藏不得此所以必於復見天地之心也銖如一堆火自其初動以至漸漸發過消盡為灰其消之未盡處固天地之心也然却消盡底亦天地之心也但那箇不如那新生底鮮好故指那接頭再生者言之則可以見天地之心親切又曰要説得見字親切蓋此時天地之間無物可見天地之心只有一陽初生淨淨潔潔見得天地之心在此若是三陽發生萬物之後則天地之心盡散在萬物不能見得如此端的又曰這處在天地則為隂陽在人則為善惡有不善未嘗不知知之未嘗復行不善處便是隂知處便屬陽上五隂下一陽是當沈迷蔽固之時忽然一夕醒覺便是陽動處齊宣王興甲兵危士臣搆怨於諸侯可謂極矣及其不忍觳􅑌即見善端之萌肯從這裏做去雖三王事業何患不到宇淳問一陽復在人言之只是善端萌處否曰以善言之是善端方萌處以惡言之昏迷中有悔悟向善意便是復又如人之沈滯道不得行到極處忽小亨通雖未大行已有可行之兆亦是復這道理千變萬化隨所在無不渾淪又曰隂陽生殺固無間斷而亦不容並行且如人方窮物欲豈可便謂其間天理元不間斷而且肆其欲哉要須窮欲之心滅息然後天理乃得萌耳答王遇復有兩樣有善惡之復有動靜之復兩樣復自不相須須各看得分曉終日營營與萬物並馳忽然有惻隱是非羞惡之心發見此善惡為隂陽也若寂然至靜之中有一念之動此動靜為隂陽也僴論程傳程先生説天地以生物為心最好此乃是無心之心也人傑道夫言向者先生教思量天地有心無心近思之切謂天地無心便是天地之心若使其有心必有思量有營為天地曷嘗有思慮來然其所以四時行百物生者蓋以其合當如此便如此不待思惟此所以為天之道答曰如此則易所謂復其見天地之心正大而天地之情可見又如何如公所説祇説得他無心處耳若果無心則須牛生出馬桃樹上發李花他又却自定心便是主宰處所以謂天地以生物為心某謂天地别無勾當只是以生物為心一元之氣運轉流通略無停間只是生出許多物事而已又曰天地有箇無心之心復卦一陽生於下便是生物之心又如所謂惟皇上帝降衷于下民天道福善禍淫這便自分明有箇人在裏面主宰相似道夫天地以生物為心者也雖氣有闔闢物有盈虛而天地之心則亙古亙今未始有毫釐之間也故陽極於外復生於內聖人以為於此可以見天地之心焉蓋其復者氣也其所以復者則有自來矣向非天地之心生生不息則陽之極也一絶而不復續矣尚何以生於內而為闔闢之無窮乎答敬夫鄭兄問程傳云先儒皆以靜見天地之心因舉王輔嗣説寂然至無乃天地心曰他説無是亂説若靜處説無不知下面一畫作甚麼宇可學問靜亦是心而心未見曰固是但又須靜中含動意始得又曰上五隂亦不可説無説無便死了無復生成之意如何見其心可學問程子以動之端為天地之心動乃心之發處何故云天地之心曰此須就卦上看上坤下震坤是靜震是動十月純坤當貞之時萬物收斂寂無蹤迹到此一陽復生便是動然不直下動字却云動之端端又從此起雖動而物未生未到大動處凡發生萬物都從這裏起豈不是天地之心淳十月陽氣收斂一時關閉得盡天地生物之心固未嘗息但無端倪可見惟一陽初動則生意始發露出乃始可見端緒也言動之頭緒於此處起於此起處方見得天地之心也銖論遺書程子曰聖人無復故未嘗見其心者蓋天地之氣所以有善之復者以其有隂故也衆人之心所以有善之復者以其有惡故也若聖人之心則天理渾然初無間斷人孰得以窺其心之起滅邪若靜而復動則亦有之但不可以善惡而為言耳答吳翌道夫竊謂聖人之心天地之心也天地之心可見則聖人之心亦可見況夫復之為卦一陽復於積隂之下乃天地生物之心也聖人雖無復然是心之用因時而彰故堯之不虐舜之好生禹之拯溺湯之救民於水火文王之視民如傷是皆以天地之心為心者也而謂不可見何哉曰大抵易之言隂陽有指君子小人而言有指天理人欲而言有指動靜之機而言初不可以一偏而論如天下皆君子而無小人皆天理而無人欲其善無以加有若動不可以無靜靜不可以無動蓋造化不能以獨成而或者見其相資而不可相無也遂以為天下不可皆君子而無小人不能皆天理而無人欲此得其一偏之論只如有不善未嘗不知知之未嘗復行此賢者之心因復而見者至若聖人則無此故其心不可見然亦有因其動而見其心者正如公所謂堯之不虐舜之好生皆是因其動而見其心者道夫堯舜孔子之心千古常在聖人之心周流運行何往而不可見此獨曰聖人無復未嘗見其心者只為是因説復卦而言繫辭曰復小而辨於物蓋復卦是一陽方生於羣隂之下如幽暗中一點白便是小而辨也又曰復其見天地之心若聖人之心純於善而已所以謂未嘗見其心者只是言不見有昏蔽忽明之心如所謂幽暗中一點白者而已但此等説話只可就此一路看去才轉入别處便不分明也謨論邵子詩立冬是十月初小雪是十月中大雪是十一月初冬至是十一月中小寒是十二月初大寒是十二月中冬至子之半即十一月之半也人言夜半子時冬至蓋夜半以前一半已屬子時今推五行者多不之知然數每從這裏處起略不差移此所以為天心道夫一陽方動處萬物未生時此時欲動未動之間如見赤子入井之初方怵惕惻隱而未成怵惕惻隱之時故冬至子之半是康節常要就中間説子之半則是未成子方離於亥而為子方四五分常要説隂陽之間動靜之間與周程之説不同周程只是體用動靜互換無極康節只要説循環便須指消息動靜之間而言學蒙當是時一陽初動萬物未生無聲臭氣味之可尋可見所謂玄酒味方淡大音聲正希也道夫通論復艮二卦存養是靜工夫省察是動工夫其靜時思慮未萌知覺不昧乃復所謂見天地之心靜中之動也其動時發皆中節止於其則乃艮之不獲其身不見其人動中之靜也窮理讀書皆是動中工夫木之纂注程子曰一陽復於下乃天地生物之心也先儒皆以靜為見天地之心蓋不知動之端乃天地之心也非知道者孰能識之又遺書曰復非天地心復則見天地心聖人未嘗復故未嘗見其心無妄剛自外來而為主於內動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往無妄之往何之矣天命不佑行矣哉以卦變卦德卦體言卦之善如此故其占當獲大亨而利於正乃天命之當然也其有不正則不利有所往欲何往哉蓋其逆天之命而天不佑之故不可以有行也附録剛自外來説卦變動而健説卦德剛中而應説卦體大亨以正説元亨利貞淵天之命也天之道也義只一般但取其成韻耳不必強分賀孫纂注蔡氏曰剛自外來而為主於內初也乾交坤而為震也非本體來往故曰外來大畜剛健篤實輝光日新其德以卦德釋卦名義附録篤實便有輝光艮止便能篤實顯子剛上而尚賢能止健大正也以卦變卦體釋卦辭附録能止健不説健而止見得是艮來止乾是以艮之止止乾之健淵不家食吉養賢也亦取尚賢之象愚謂艮剛畜乾有養賢之象尚賢以上九一陽言養賢以乾三陽言利涉大川應乎天也亦以卦體而言愚謂六五下與乾應故曰應天頤貞吉養正則吉也觀頤觀其所養也自求口實觀其自養也釋卦辭附録觀其所養只是説君子之所養養浩然之氣模樣自養則如爵祿下至於飲食之類是説自求口實天地養萬物聖人養賢以及萬民頤之時大矣哉極言養道而贊之大過大者過也以卦體釋卦名義棟橈本末弱也復以卦體釋卦辭本謂初末謂上弱謂隂柔剛過而中巽而説行利有攸往乃亨又以卦體卦德釋卦辭大過之時大矣哉大過之時非有大過人之材不能濟也故嘆其大纂注程子曰大過之時其事甚大如立非常之大事與不世之大功成絶俗之大德皆大過之事也徐氏曰時字當玩自是時節當如此適其時當其事雖曰大過而不悖於道所謂剛過而中巽而説行者如堯舜之禪授而謳歌獄訟之皆歸湯武之放伐而徯后迎師之恐後所以成大功而濟於時焉茍非其時則堯舜亦且傳子而不傳賢矣湯武亦只守臣節而不敢革夏革殷矣時不可失此聖賢所以當天運立大事成大業也否則大亂之道而謂之利且亨可乎習坎重險也釋卦名義水流而不盈行險而不失其信以卦象釋有孚之義言內實而行有常也附録水流不盈才一坎滿便流出去行險不失其信是説決定如此維心亨乃以剛中也行有尚往有功也以剛在中心亨之象如是而往必有功也纂注蔡氏曰剛中二五也往有功動則出坎也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉極言之而贊其大也離麗也日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下釋卦名義附録重明是五二君臣重明之義大象又説大人繼世重明之義不同淵柔麗乎中正故亨是以畜牝牛吉也以卦體釋卦辭附録六二中正六五中而不正今言麗乎正麗乎中正次第説六二分數多惟這爻較好故元吉六五雖柔麗乎中而不得其正特借中字而包正字爾時舉易附録纂注卷三
