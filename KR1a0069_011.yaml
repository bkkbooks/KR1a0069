body:
  text: 易附録纂注卷十一元胡一桂撰總論序卦問序卦或謂非聖人之書信乎曰此沙隨程氏之說也先懦以為非聖人之緼某以為謂之非易之精則可謂非易之緼則不可周子分精與緼字甚分明序卦却正是易之緼事事夾雜有在裏面問何謂易之精曰如易有太極精是生兩儀兩儀生四象四象生八卦這便是易之問如序卦中亦見消長進退之義喚做不是精不得曰此正是事事夾雜有在裏面正是緼須是自一箇生出來以至於無窮便是精道夫纂注程子曰乾坤天地之道隂陽之本故為上篇之首坎離隂陽之成質故為上篇之終咸恆夫婦之道生育之本故為下篇之首未濟坎離之合既濟坎離之交合而交則生物隂陽之功也故為下篇之終二篇之卦既分而後推其義而為之次序卦是也有天地然後萬物生焉盈天地之間者唯萬物故受之以屯屯者盈也屯者物之始生也物生必蒙故受之以蒙蒙者蒙也物之稚也物稚不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟訟必有衆起故受之以師師者衆也衆必有所比故受之以比比者比也比必有所畜故受之以小畜物畜然後有禮故受之以履履而泰然後安故受之以泰朝氏云鄭無而泰二字泰者通也物不可以終通故受之以否物不可以終否故受之以同人與人同者物必歸焉故受之以大有有大者不可以盈故受之以謙有大而能謙必豫故受之以豫豫必有隨故受之以隨以喜隨人者必有事故受之以蠱蠱者事也有事而後可大故受之以臨臨者大也物大然後可觀故受之以觀可觀而後有所合故受之以噬嗑嗑者合也物不可以茍合而已故受之以賁賁者飾也致飾然後亨則盡矣故受之以剝剝者剝也物不可以終盡剝窮上反下故受之以復復則不妄矣故受之以無妄有無妄然後可畜故受之以大畜物畜然後可養故受之以頤頤者養也不養則不可動故受之以大過附録問不養則不可動故受之以大過何也曰動則過矣故小過亦曰有其信者必行之故受之以小過道夫物不可以終過故受之以坎坎者陷也陷必有所麗故受之以離離者麗也右上篇有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯附録問序卦中六十四卦獨不言咸何也曰夫婦之道即咸也曰亦如上經不言乾坤但言天地則乾坤可見否曰然道夫夫婦之道不可以不久也故受之以恆恆者久也物不可以久居其所故受之以遁遁者退也物不可以終遁故受之以大壯物不可以終壯故受之以晉附録問物不可以終壯故受之以晉𫝊曰物無壯而終止之理既壯盛則必進竊意物進而後至於壯盛既壯盛則衰退繼之矣今曰壯盛則必進此義如何曰物固有壯而後進者亦有進而後壯者其義自有不同此各隨其事而言難以一說拘也且以十二月卦論大壯之為夬夬之為乾豈非壯而後進乎至乾乃極而衰耳又問壯與晉何别曰不但如此壯而已又更須進一步也道夫晉者進也進必有所傷故受之以明夷夷者傷也傷於外者必反其家故受之以家人家道窮必乖故受之以睽睽者乖也乖必有難故受之以蹇蹇者難也物不可以終難故受之以解解者緩也緩必有所失附録問緩字恐不是遲緩之緩乃是懈怠之意故曰解緩也曰緩字是散意道夫故受之以損損而不已必益故受之以益益而不已必決故受之以夬夬者決也決必有所遇故受之以姤姤者遇也物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升升而不已必困故受之以困困乎上者必反下故受之以井井道不可不革故受之以革革物者莫若鼎故受之以鼎主器者莫若長子故受之以震震者動也物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妹得其所歸者必大故受之以豐豐者大也窮大者必失其居故受之以旅旅而無所容故受之以巽巽者入也入而後說之故受之以兊兊者說也說而後散之故受之以渙渙者離也物不可以終離故受之以節節而信之故受之以中孚有其信者必行之故受之以小過有過物者必濟故受之以既濟物不可窮也故受之以未濟終焉右下篇易附録纂注卷十一
