body:
  text: 易附録纂注卷十三元胡一桂撰原象愚按五贊大要皆教人以象占之學首篇原竒偶之象推象之由也次篇述作者之㫖為占而作也三篇明筮以發其占四篇稽類以考其象五篇以警學名欲人讀易之際常如卜筮之臨假象辭以為儀則而終趨於吉是又㑹象占而一之也先生嘗曰某解易只作卜筮之書今五贊皆以象占示教其㫖深矣太一肇判隂降陽升陽一以施隂兩而承惟皇昊羲仰觀俯察竒偶既陳兩儀斯設既幹乃支一各生兩隂陽交錯以立四象竒加以竒曰陽之陽竒而加偶陽隂以章偶而加竒隂內陽外偶復加偶隂與隂㑹兩一既分一復生兩三才在目八卦指掌竒竒而竒初一曰乾竒竒而偶兊次二焉竒偶而竒次三曰離竒偶而偶四震以隨偶竒而竒巽居次五偶竒而偶坎六斯覩偶偶而竒艮居次七偶偶而偶坤八以畢初畫為儀中畫為象上畫卦成人文斯朗因而重之一貞八悔六十四卦由內達外附録貞悔出洪範貞是正底便是體悔是過底動則有悔凡悔都是過了方悔這悔是過底意思亦是多底意思下三爻便是正卦上三爻似是過多了亦似今占卜分甚主客賀孫貞是事之始悔是事之終貞是事之主悔是事之客貞是在我底悔是應人底一貞八悔如乾至泰內體皆乾是一貞外體八卦是八悔餘放此義剛交易為體往此來彼附録先天圖一邊本都是陽一邊本都是隂陽中有隂隂中有陽便是陽往交易隂隂來交易陽兩邊各各相對其實非此往彼來只其象如此僴變易為用時靜時動降帝而王𫝊夏歷商有占無文民用弗章文王繫彖周公繫爻視此八卦二純六交乃乾斯父乃坤斯母震坎艮男巽離兊女離南坎北震東兊西乾坤艮巽位以四維建官立師命曰周易孔聖𫝊之是為十翼遭秦弗燼及宋而明邵𫝊羲畫程演周經象陳數列言盡理得彌億萬年永著常式述㫖昔在上古世質民淳是非莫别利害不分風氣既開乃生聖人聰明睿知出類超羣仰觀俯察始畫竒偶教之卜筮以斷可否作為君飾開鑿户牖民用不迷以有常守降及中古世變風移淳澆質喪民僞日滋穆穆文王身蒙大難安土樂天惟世之患乃本卦義繫此彖辭爰及周公六爻是資因事設教丁寧詳密必中必正乃亨乃吉語子惟孝語臣則忠鈎深闡微如日之中爰暨末流淫於術數僂句成欺黃裳亦誤纂注左𫝊昭公二十五年臧昭伯如晉臧㑹竊其寶龜僂句以卜為信與僭僭吉後平子立㑹㑹曰僂句不余欺也注僂句龜所出地名僭不信也謂求立為臧氏後也黃裳事見坤卦六五爻大哉孔子晚好是書韋編既絶八索以祛乃作彖象十翼之篇専用義理發揮經言居省象辭動察變占存亡進退陟降飛潛曰毫曰釐匪差匪繆假我數年庶無大咎恭惟三古四聖一心垂象炳明千載是臨惟是學者不本其初文辭象數或肆或拘嗟豫小子既微且陋鑽仰沒身奚測奚究匪警滋荒匪識滋漏維用存疑敢曰垂後明筮倚數之元參天兩地衍而極之五十乃備是曰大衍虛一無為其為用者四十九蓍信手平分置右於几取右一蓍掛左小指乃以右手揲左之策四四之餘歸之於扐初扐左手無名指間右䇿左揲將指是安再扐之竒通掛之算不五則九是謂一變置此掛扐再用存策分掛揲歸復準前式三亦如之竒皆四八三變既備數斯可察數之可察其辨伊何四五為少八九為多三少為九是曰老陽三多為六老隂是當一少兩多少陽之七孰八少隂少兩多一既得初爻復合前蓍四十有九如前之為三變一爻通十八變六爻發揮卦體可見老極而變少守其常六爻皆守彖辭是當變視其爻兩兼首尾變及三爻占兩卦體或四或五視彼所存四二五一二分一専皆變而他新成舊毁消息盈虛舍此視彼乾占用九坤占用六泰愕匪人姤喜來復稽類八卦之象說卦詳焉考之於經其用弗専彖以情言象以象告惟是之求斯得其要乾健天行坤順地從震動為雷巽入木風坎險水泉亦雲亦雨離麗文明電日而火艮止為山兊說為澤以是舉之其要斯得凡卦六虛竒偶殊位竒陽偶隂各以其類得位為正二五為中二臣五君初始上終貞悔體分爻以位應隂陽相求乃得其正凡陽斯淑君子居之凡隂斯慝小人是為常可類求變非例測非常曷變謹此為則警學讀易之法先正其心肅容端席有翼其臨於卦於爻如筮斯得假彼象辭為我儀則字從其訓句逆其情事因其理意適其平曰否曰臧如目斯見曰止曰行如足斯踐毋寬以略毋密以窮毋固而可毋必而通平易從容自表而裏及其貫之萬事一理理定既實事來尚虛用應始有體該本無稽實待虛存體應用執古御今由靜制動附録聖人作易只說一箇理都未曽有許多事却待甚麼事來湊所謂事來尚虛蓋謂事之方來尚虛而未有若論其理則先自定固已實矣用應始有謂理之用實故有體該本無謂理之體該萬物初無形迹可見故無下云稽考實理以待事物之來存此理之體以應無窮之用執古古便是易書裏面言語御今今便是今日之事以靜制動理便是靜底事便是動底敬之潔靜精微是之謂易體之在我動有常吉在昔程氏繼周紹孔奧指宏剛星陳極拱惟斯未啓以俟後人小子狂簡敢述而申易附録纂注卷十三
