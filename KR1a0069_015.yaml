body:
  text: 易附録纂注卷十五元胡一桂撰愚接易有卦象爻象有卦序有卦互體本義皆未有圗今為圗并說及有文言辨十翼論各一篇不敢列于九圗悉附五贊後云卦象圖易大𫝊曰庖羲氏仰以觀于天文俯以察於地理觀鳥獸之文與地之宜近取諸身逺取諸物始作八卦卦即象也至文王周公孔子象益著焉而其所謂象亦不過天文地理人事鳥獸草木數端而已朱子嘗謂四聖之易各有不同不可作一例看故今列為此圖天地人物之象畢具而羲文周孔取象之同異皆於此可見云伏羲卦文王彖周公爻孔子大象文言說卦爻象圖世儒言象尚矣率多祖說卦子彖爻孫卦體其有不合說卦者則委曲牽合傅㑹以幸其中而數聖人取象之意胥失之矣何則卦者象之原也彖者言象之始也爻者言象之衍也說卦者總彖爻取象之例也然夫子夢周公而心文王參包羲於未畫其於說卦明象不特括彖爻之例又自有出於彖爻之外者不可不察也姑即數卦論之坤為馬離為牛文王之彖也乾稱龍馬稱龍見乾六爻稱馬見大畜爻震坎稱乘馬見屯卦周公之爻也自文王取象觀之乾何嘗稱馬坤何嘗稱牛震何嘗稱龍周公雖于大畜之乾稱馬而于乾本卦但稱龍坤亦未嘗稱牛震亦未嘗稱龍也夫子則直曰乾為馬坤為牛震為龍是豈故欲異于文王周公哉又自有見於卦爻之象而取之也或者不察但見乾馬坤牛載於說卦舉凡卦爻之言馬必求之乾言牛必求之坤如王輔詞所謂定馬于乾案闕卦有馬無乾則僞說滋謾者自漢儒以來不能不墮此弊矣終輔嗣雖知非先儒之失實自未嘗勘破夫子取象本不必同於先聖是以卒無一說以為之剖決但謂不必泥象至有忘象之論是亦甚未為得也近世西蜀大儒隆山李先生優于明象者也其論坤卦直曰乾既稱馬坤不得不稱牝以别之殊不知彖文王所作文王彖乾何嘗稱馬而顧於坤乃稱牝以求别於乾也此亦祖說卦以為論而其失殆有甚焉者然則說卦不足據歟曰由文王而周公由周公而孔子故彖而後有爻爻而後有說卦其人非一時其書非一手其取象非一端故朱夫子嘗謂伏羲自是伏羲易文王自是文王易周公自是周公易孔子自是孔子易各有不同於其不同之中而求其同可也遽謂孔子易即文王周公之易而以彖爻大象盡求合於說卦不可也蓋自諸儒分經合𫝊之後學者便文取義往往混而同之其患故如此愚嘗妄謂說卦之言象其有合于彖爻者則括彖爻之例也如震坎稱馬之類其有不合于彖爻者則又夫子之所自取也如坤牛震龍之類其有彖爻所未取而取者則又夫子所以括大象之例如乾天坤地之類而亦有出于大象之外者也如乾父坤母之類以此求之其亦庶乎不至于膠且泥矣雖然彖爻所取之象猶略耳如乾爻雖象以龍而彖於元亨利貞之外象則未之聞文王於乾無所取象坤彖雖象以馬而自牝馬之外他象則未之見至吾夫子以八物窮卦爻之情以八德狀卦爻之性而六十四卦大象如乾則統象于天坤則統象于地象屯以雲雷象蒙以山泉直曲盡卦爻之妙而發文王周公不言之祕又為之說卦以旁通之微夫子則天地山澤雷風水火之象健順動入陷麗止說之德終莫能以自著何以致用于天下此萬世而後決嫌疑定猶豫謀之卜筮皆有所觀玩而不迷于吉凶悔吝之塗者夫子之功實倍三聖窮天地亘古今而不可泯滅者也或疑八物之象見于左𫝊謂夫子之前已有者非也愚于文言辨論之詳矣世儒但區區文字間以求其言象之合莫究其施于實用功在生民德侔天地是豈足與論夫子之盛哉朱夫子易象說既深足以破古今忘象泥象者一偏之見㬊淵亞夫之録以為非圖無以見凡例愚不敏謹遵遺訓而以彖爻大象文吉說卦凡言象者分八卦為圖而以天文地理人事鳥獸草木為次列八卦于其上位四聖于其左按圖而觀取象之同異庶乎其可見矣前說聖人取象非一端有取之全體者有取之各體者有取之互體者有取之似體者有取之應體者有雖無其象而取卦名義者有取之逐爻者有取之逺近取之隂陽之爻者如頤如井如鼎此伏羲取之全體者卦即象也如大過棟橈小過飛鳥如剝之牀咸艮之身如六十四卦之大象此文王周公孔子取之全體者如屯豫建侯則侯屬震大畜良馬則馬屬乾說卦八物各屬八卦此皆取之各體者如同人闕畜闕取互體震巽中孚賁稱馬兼取互體震坎頤闕大壯似兊而稱羊明夷互坎無應而稱喪馬二簋無其象而義取諸損此皆取之互體似體應體與夫卦名義者悉見彖爻中至于逐爻取義而分逺近隂陽則文王周公彖爻難以槩舉愚既分八卦為圖各疏羲文周孔之尤而逐爻取象則别為圖以該之庶幾不至混淆以便觀玩非敢自謂有得于易也嘗試論之羲之象在卦中文之象取其大綱周公雖本之文王已多其所自取夫子雖本之文王周公然其同者間見而其所自取者抑不止如周公之多於文王矣然則易之取象實至夫子而大備也微夫子之象不可也但讀易者毋執周公之象以求之文王又毋執夫子之象以求之文王周公同者自同異者自異要皆各明夫伏羲之卦可也必欲牽合傅㑹盡强而同之是亂數聖人之象也亂數聖人之象而象終不可悟其亦弗思之甚也續說卦序圖乾恆咸坤壯大遁蒙屯夷明晉訟需需訟對晉明夷暌家人比師解蹇履小畜益損否泰秦否對損益姤夬有大同人升萃䂊謙井困蠱隨鼎革觀臨艮震賁噬嗑妹解漸復剝旅豐畜大無妄兊巽頤似離節渙大過似坎中孚中孚似頤厚畫離體坎小過小過似大過厚畫坎體離濟未既濟既未坎離之交不交愚按易緯書曰易六十四卦文王以上下經分之邵子震巽首乾坤中坎離終水火之交不交皆至理也又曰乾坤坎離上篇之用兊艮震巽下篇之用頤中孚大小過二篇之正又曰天有二正乾離地有二正坤坎共用二變以成八卦也二變震巽震反為艮巽反為兊合四正卦為八卦天有四正坤坎兼頤中孚頤似離中孚厚畫離地有四正坤坎兼大小過大過似坎小過厚畫坎共用二十八變以成六十四卦也二十八卦反覆為五十六通上八卦為六十四是以小成之卦正者四變者二共六卦也大成之卦正者八變者二十八共三十六卦也三十六指上下經各十八卦而言三十六是天地間真數天南極入地三十六度北極出地三十六度亦理數之極至者環溪李氏曰經分上下見于大傳大衍章二篇之䇿之語兼序卦至坎離别起文義而上經首乾坤是二老對立下經首咸是二少合體故序卦上經隱乾坤之名下經獨隱咸之名以闕見者上經需訟對下經晉明夷需訟變之盡為闕為需上經泰否對下經損益泰否乾坤之交不交損益咸恆之交不交也上經自屯蒙至臨觀下經自遁大壯至革鼎此屯蒙變之盡為革鼎臨觀變之盡為遁大壯也上經頤與大過偶而在坎離之前下經中孚與小過偶而在既濟未濟之前上經終于坎離下經終于既濟未濟而既濟未濟者坎離之交不交也頤似離大過似坎而坎離繼之中孚厚畫離小過厚畫坎而既未濟繼之此坎離又為乾坤震巽艮兊之用也上經五十二陽爻五十六隂爻下經五十六陽爻五十二隂爻以此觀之信知經分上下必有至理惜乎其說不𫝊未能究其所以然者愚謂序卦至理雖不可以淺窺然諸儒之論亦得其略矣故不敢復贅為之說云卦互體圖乾互體凡十二卦凡十六乾相與坤卦爻隂陽對乾夬大有大壯同人革姤大過鼎恆遁咸兊互體凡十六卦凡十六兊相與艮卦爻隂陽對大有大壯小畜需大畜泰離豐鼎恆巽井蠱升旅小過離互體凡十六卦凡十六離相與坎卦爻隂陽對小畜需履兊睽歸妹家人既濟巽井訟困未濟解漸蹇震互體凡十六卦凡十六震相與巽卦爻隂陽對大畜泰中孚節損臨賁明夷蠱升渙坎蒙師艮謙巽互體凡十六卦凡十六巽相與震卦爻隂陽對萃否小過旅咸遁困訟隨無妄豐離革同人兊履坎互體凡十六卦凡十六坎相與離卦爻隂陽對豫晉謙艮蹇漸解未濟震噬嗑明夷賁既濟家人歸妹睽艮互體凡十六卦凡十六艮相與兊卦爻隂陽對比觀豫晉萃否坎渙屯益震噬嗑隨無妄節中孚坤互體凡十二卦凡十二坤相與乾卦爻隂陽對坤剝比觀師蒙復頤屯益臨損易大𫝊曰若夫雜物撰德辨是與非則非其中爻不備本義曰此謂卦中四爻語録曰先儒解此多以為互體如屯震下坎上就中間四爻觀之自二至四則為坤自三至五則為艮故曰非其中爻不備互體說漢儒多用之左𫝊占得觀卦處亦舉得分明看來此說不可廢陳厲公生敬仲筮之遇觀之否曰坤土也巽風也乾天也風為天于土上山也有山之材而照之以天光于是乎居土上兩卦皆有互體之艮故言山今分八卦為圖揭中四爻以明卦之有互體卦位為次圖成而卦爻隂陽各各相對莫不有其意義所存若以六十四卦橫圖觀之尤有可言者自第二畫至第四畫陽儀中互四乾四兊四離四震四巽四坎四艮四坤隂儀中亦互四乾至四坤兩以四卦數之而周六十四卦自第三畫至第五畫陽儀中前十六卦互二乾至二坤後十六卦亦互二乾至二坤隂儀中互體亦然四以二卦數之而周六十四卦然後合全體觀之自初畫至三畫一箇乾一至坤八而該六十四二畫至四畫兩箇乾一至坤八而該六十四四畫至上畫八箇乾一至坤八而六十四卦成矣加倍而生以次而位乾一坤八之序一皆順數之而不紊焉此又其自然之妙也至若乾卦中四爻自互二乾并二體為四乾坤卦中四爻自互二坤并二體為四坤是乾皆互乾坤皆互坤隂陽各得而不雜也三男之卦各聚三男三女之卦各聚三女如震卦自二至四互艮自三至五互坎坎卦自二至四互震自三至五互艮艮卦自二至四互坎自三至五互震各并本卦而三男備巽離兊三女之卦互體亦然陽皆互陽隂皆互隂女不紊男男不紊女此又自然而然不加人力有不容言之妙者其他亦有一卦備三男三女者小畜備三女而臨之以父豫備三男而臨之以母節備三男而少女間之旅備三女而少男間之如革如鼎此父之臨三女也如蒙如屯此母之臨三男也如豐如井則長男中男間三女如渙如噬則長女中女間三男此皆父母男女雜居而不純者也謂互體非易中一義斷斷乎其不可也讀易者其可忽諸易十翼論易之有十翼猶天之有日月人之有耳目輕重之有權衡長短之有尺度誠易之門庭象數之機括也十翼不作易之名且不立卦畫于誰乎吾不得而知也辭繫于誰乎吾不得而知也卦辭將何用乎吾不得而知也乾烏知其為天乎坤烏知其為地乎震巽坎離艮兊烏知其為雷風水火山澤乎十翼作矣易之名立矣卦然後知其為羲之畫也辭然後知其為文之繇也卦辭然後知其為卜筮之用也乾然後知其為天坤然後知其為地震巽坎離艮兊然後知其為雷風水火山澤也不特此爾讀仰觀俯察章則知伏羲泛觀易之寓讀神物變化章則知伏羲默得易之要讀極儀象卦成列因重章則知伏羲作易得自然之位與六十四卦之次是伏羲之易非十翼無以自眀於後世易之興也當殷之末世周之盛德邪當文王與紂之事邪則是易其為文王之興易矣易之作也其于中古乎作易者其有憂患乎以至九卦之陳盡本全卦之序吾又知文王為憂患而作易不徒繫以辭而序易亦出于文王矣帝出乎震齊乎巽以下後天八卦方位之序不一言之是文王之易非十翼亦無以自白于世也其曰聖人作易生蓍倚數立卦生爻以和道德以順性命此言聖人不徒畫為一定之卦而用易有蓍如此其曰大衍之數五十分二掛一揲四歸竒再扐後掛此明揲蓍之法以垂萬世而本末曲盡無遺者又如此其曰繫辭焉以明吉凶又曰繫辭焉以斷吉凶又曰繫辭焉以盡言變而通之以盡利鼓之舞之以盡神此明聖人繫辭亦無非所以為尚占之用以利人此羲文之易非十翼亦無以闡其用於世也以至八卦不徒列八物之象而天之健地之順雷風之動入坎離之陷麗山澤之止說必毫分而絲析之唯恐斯人知其象而莫知其德及夫六十四卦之大象論象之後必示人以占易之方不啻耳提面命之教是卦爻之性情非十翼亦無以發其藴於世也吾故曰易之有十翼猶天之有日月人之有耳目輕重之有權衡長短之有尺度誠易之門庭象數之機括者此也猶未也蓋至於崇陽抑隂進君子退小人尊卑之分貴賤之等與夫幽明之故死生之說鬼神之情狀凡可因以發明性命道德之藴以淑身心者纎悉畢言之於是易始不徒局于象數卜筮之書推之而至精至變至神之妙天下萬世皆由之以識太極儀象生八卦之道而盡事物之情雖不假卜筮亦自足以為吉凶之前知矣十翼之作其有功于萬世固如此哉不然如爻辭先儒以為繫于周公至引韓宣子適魯見易象而知周公之德為證亦可謂有據矣然夫子于十翼所未明言後世遂不免紛紛之疑卒莫能有一定之說雖以朱夫子亦不過曰是先儒之言且得從之則亦莫能必其作于周公也而况卦也彖也卜筮也八卦之性情也微十翼欲其不懵然於人心不可也嗚呼易之不可無十翼審矣近世歐公乃不能不致疑于其書童子問中直以繫辭與文言為非夫子作是何其無見于易一至此邪猶幸而朱夫子之論昭如也本義啓蒙不作如之何其可也文言辨或疑文言非夫子作蓋以第一節與穆姜之言不異本義以為疑古有此語穆姜稱之夫子亦有取焉得之矣然猶以為疑古有之初亦未嘗質言之者蓋嘗妄論之曰若果如或疑則何止文言雖大象亦謂之非夫子作可也何者八卦取象雖多而其要者則天地山澤雷木風水雲泉雨火電日皆大象取者今考文言彖辭自震雷之外震驚百里即雷也離雖取象于日而未嘗象火周公爻辭自巽木漸四爻離火離豐之外雖三取雨象亦未嘗専取坎他則未之聞焉至夫子翼易始列八物之象而六十四卦大象于是乎始各有定屬如是則夫子以前凡引易者不當有同焉者也而左傳所載卜筮之辭多取八物之象此皆在夫子未作前引易以占者如此若然則大象亦謂之非夫子作凡卜筮之辭已前元有可也謂夫子作者非也今欲知其果作于夫子而無疑其將何說以證嘗反覆思之而得其說春秋夫子筆削之經也左傳春秋經傳也夫子繫易實在作春秋之前絶筆于獲麟蓋不特春秋之絶筆亦諸經之絶筆也左氏生夫子之後尊信夫子春秋始為之傳由此觀之謂易有取於左傳乎抑左傳有取于易也又况左傳所載當時語其事則髣佛其文多出于自為如吕相絶秦書今觀其文法要皆左氏之筆而穆姜為人淫慝迷亂安得自知其過而有此正大之言如棄位而姣等語決知非出於其口如是則四德之說是左氏本文言語作為穆姜之言明矣至若占辭多取諸八物亦非當時史氏語左氏蓋本夫子大象以文之一時不暇詳密遽以夫子所作之辭為夫子以前之人之辭也又如國語載司空季子為晉文公占得國之辭又不特取諸八物且有及於坎勞卦之說如是則并與說卦亦謂之非夫子作可乎大抵居今之世讀古聖人書只當以經證經不當以𫝊證經若經有可疑他經無證闕之可也何况夫子十翼其目可數今乃因𫝊文反致疑于經可乎愚是以知文言大象真夫子作而左氏所引不足為惑故不得不辨本義啓蒙論有天地矣可無易乎不可也有易矣可無本義啓蒙乎不可也金聲玉振集大成衆言殽亂折諸聖朱夫子其聖人之徒歟蓋自漢儒始變亂古易至有流為術數之歸而卒大亂于王弼且雜以虛無之論吾易遂晦蝕于天下寥寥千載孰覺我人太極有圖易通有書發往古不𫝊之祕開萬世理學之源斯道始有係屬逮夫易𫝊寫胸中之成書皇極具經世之大法正蒙闡象數之條目是雖古經變亂未就釐正而術數虛無之學為之一洗吾易粲然復明未幾陋儒妄作異論蜂起易置圖書闕指闕邵子林栗冒僞著述麻衣易之類易道又幾晦蝕朱夫子勃興探前聖之精微破俗學之繆妄本義啓蒙有作而後吾易復明於後世愚嘗謂孔聖以來朱夫子有功於易斷斷乎其不可及者蓋以本義之為書也圖書位定而天地自然之易明先後天圖列而羲文之易辨二篇十翼不相混雜易經始為之復昌明於後世三百八十四爻兩言以蔽之曰象占而觀玩不涉虛無至於崇陽抑隂進君子退小人發于坤初六之爻者不過數語而天之經地之義人之紀易之要領直包括無遺恨此本義不可少于天下也啓蒙之為書也本圖書則揭天生神物章而易之本原正原卦畫則表易有太極章而易之位列明明蓍䇿則發明大衍章而掛扐之法定考變占則博取左氏𫝊以明斷例而吉凶趨避之見審合四篇大㫖一皆寓尊陽之微意而小人盜賊不得竊取而用此啓蒙不可少于天下也語録成書如闕麻衣劉牧與夫林栗袁樞之徒所以惑世誣民者莫不悉有以黜其僞折其悖摧陷廓清羽翼數聖人之易于天下此愚所謂自孔聖以來朱夫子有功于易斷斷乎不可及者豈誣也哉或曰是則然矣易者隂陽剛柔仁義性命道德之書今斷然蔽之以卜筮得毋局于一偏而不免漢儒術數之弊乎且繫辭明言易有聖人之道四焉今本義惟以象占分之而不及辭變得毋四者之目遺其二乎吁是皆未之思也易固隂陽剛柔仁義性命道德之書而卜筮者正將使人盡仁義之道參隂陽剛柔以順性命以和道德耳豈徒託之空言而不見諸實用乎又況卜筮之頃至理無乎不在正得聖人作易本意朱子已嘗言之奈何以此疑吾易乎至于聖人之道雖有四實不離乎二有象而後有辭有占而後有變不得于象則玩辭為空言不由于占則觀變于何所故有象辭有占辭占而後有卦變爻辭舉象占則辭變在其中若惟舉占則象辭變在其中此四者之序由輕歸重辭變統于象占象又統于占所以本義舉象占而統論易書一以貫之曰占謂之有遺可乎哉或又曰易之所重在占固也人之于易必占而後可用不占則易竟無用矣乎曰不然也朱子嘗曰凡讀一卦一爻便如占筮所得虛心以求辭義之所歸以為凶吉可否之決然後考其象之所以然求其理之所以然推之于事使上自王公下至民庶所以修身治國皆有所用初未嘗不示人以學易而用之之方也必曰占乎而後用之朱子之志荒矣易附録纂注卷十五
