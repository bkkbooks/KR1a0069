body:
  text: 易附録纂注卷五元胡一桂撰象者卦之上下兩象及兩象之六爻周公所繫之辭也附録易象説易之有象其取之有所從其推之有所用非茍為寓言也然兩漢諸儒必欲究其所從則既滯泥而不通王弼以來直欲推其所用則又疏略而無據二者皆失之一偏而不能闕其所疑之過也且以一端論之乾之為馬坤之為牛説卦有明文矣馬之為健牛之為順在物有常理矣至於案文索卦若屯之有馬而無乾離之有牛而無坤乾之六龍則或疑於震坤之牝馬則當反為乾是皆有不可曉者是以漢儒求之説卦而不得則遂相與創為互體變體五行納甲飛伏之法參互以求而幸其偶合其説雖詳然其不可通者終不可通其可通者又皆傅會穿鑿而非有自然之勢唯其一二之適然而無待於巧説者為若可信然上無所關於義理之本原下無所資於人事之訓戒則又何必苦心極力以求於此而欲必得之哉故王弼曰義茍應健何必乾乃為馬爻茍合順何必坤乃為牛而程子亦曰理無形也故假象以顯義此其所以破先儒膠固支離之失而開後學玩辭玩占之方則至矣然觀其意又似直以易之取象無復有所自來但如詩之比興孟子之譬喻而已如是則説卦之作為無所與於易而近取諸身逺取諸物者亦剩語矣故疑其説亦若有未盡者因切論之以為易之取象固必有所自來而其為説已具於太卜之官顧今不可復考則姑闕之而直據辭中之象以求象中之意使冒以為訓戒而決吉凶如王氏程子與吾本義之云者其亦足矣固不必深求其象之所自來然亦不可直謂假設而遽欲忘之也甚看易若靠定象看便滋味長若只懸空看也沒意思輝王弼伊川於象底意思不可見却只就他那象上推求道理淵愚嘗謂數聖人取象各有不同故説卦言象求之於經不盡合蓋夫子所自取之象惟多不必盡同於先聖也朱子嘗曰伏羲自是伏羲易文王周公自是文王周公易夫子自是夫説子易以此求之得其要矣詳見易象圖天行健君子以自強不息天乾卦之象也凡重卦皆取重義此獨不然者天一而已但言天行則見其一日一周而明日又一周若重復之象非至健不能也君子法之不以人欲害其天德之剛則自強而不息矣附録乾卦有兩乾是兩天也昨日行一天也今日行又一天也其實一天而行健不已此所以為天行健也人傑胡安定説得好曰天者乾之形乾者天之用天形蒼然南極入地下三十六度北極出地上三十六度狀如倚杵其用則一晝一夜行九十餘萬天之行健可知故君子法之以自強不息云淵因言天之氣運轉不息故閣得地在中間如弄碗珠底只運動不住故在空中不墜少有息則墜矣銖君子以自強不息非是説去趕逐他學他如此不息只是常存得此心則天理常行而周流不息矣輝天行健以氣言之則一晝一夜周乎三百六十五度而又過一度以理言之則於穆不已無間容息豈不是至健僴愚謂六十四卦大象皆著一以字以者所以體易而用之也即一以字示萬世學者用易之方不可不察也潛龍勿用陽在下也陽謂九下謂潛見龍在田德施普也附録如日方升雖未中天而其光已無所不被矣銖終日乾乾反復道也反復重復踐行之意纂注徐氏曰反復往來必由乎道動循天理雖危而安也三位在二體之中可進而上可退而下故言反復或躍在淵進無咎也可以進而不必進也纂注徂徠石氏曰爻辭但云或躍無咎夫子必謂須進乃加進字以斷其疑以進為無咎不進則有咎矣以進釋躍字飛龍在天大人造也造猶作也亢龍有悔盈不可久也纂注丘行可曰盈謂陽極釋亢字不可久謂隂生釋有悔字用九天德不可為首也言陽剛不可為物先故六陽皆變而吉下天行以下先儒謂之大象潛龍以先儒謂之小象後放此附録乾為萬物之始故天下之物無不資之以始但其六爻有時而皆變故有羣龍無首之象而君子體之則當謙恭卑順不敢為天下先耳非謂可天德而不可為首若曰乾不為首則萬物何所資始而又誰為之首乎纂注徐氏曰六爻皆用九則乾變之坤九者剛健之極天之德也天德不可為首指卦變言即坤無首之義非謂乾剛有所不足也善用九者物極必變剛而能柔不為物先用坤道也地勢坤君子以厚德載物地坤之象亦一而已故不言重而言其勢之順則見其髙下相因之無窮至順極厚而無所不載也附録地之勢常有順底道理且如這箇平地面前便有坡陀處那突然起底也日順淵銖問地勢猶言髙下相因之勢以其順且厚否曰髙下相因只是順若厚又是一箇道理然惟其厚所以上下只管相因去只見得他順若是薄底物髙下只管相因則傾陷了不能如此之無窮矣惟其髙下相因無窮所以為至順也君子體之惟至厚為能載物也履霜堅冰隂始凝也馴致其道至堅冰也案魏志作初六履霜今當從之馴順習也六二之動直以方也不習無不利地道光也含章可貞以時發也或從王事知光大也纂注程子曰夫子懼人守文而不達義也又從而明之言義所當為則以時而發非含藏終不為也又曰象只舉上句解義則并及下文或從王事而能無成有終者是其知之光大也唯其知之光大故能含晦淺暗之人有善唯恐人不知豈能含章也括囊無咎慎不害也黃裳元吉文在中也文在中而見於外也龍戰于野其道窮也用六永貞以大終也初隂後陽故曰大終附録坤六爻皆隂其始本小到此隂皆變陽所謂以大終也言始小而終大文蔚雲雷屯君子以經綸坎不言水而言雲者未通之意經綸治絲之事經引之綸理之也屯難之世君子有為之時也纂注馮氏曰雲雷方作而未有雨有屯結之象君子觀象以治世之屯猶治絲者既經之又綸之所以解其結而使就條理也愚謂坎在上為雲未下而成雨故雲雷屯言隂陽之未通也雖盤桓志行正也以貴下賤大得民也纂注程子曰陽居隂下貴下賤之象方屯之時隂柔不能自存有一陽剛之才衆所歸從更能自處卑下所以大得民也六二之難乘剛也十年乃字反常也即鹿無虞以從禽也君子舍之往吝窮也纂注程子曰事不可而妄動以從欲也無虞而即鹿以從禽也當屯之時不可動而動猶無虞而即鹿以有從禽之心也君子則見幾而舍之不從若往則可吝而困窮矣求而往明也屯其膏施未光也泣血漣如何可長也山下出泉蒙君子以果行育德泉水之始出者必行而有漸也附録育德有山之象果行有水之象纂注徐氏曰蒙而未知所適也必體坎之剛中以決果其行而達之蒙而未有所害也必體艮之靜止以養育其德而成之利用刑人以正法也發蒙之初法不可不正懲戒所以正法也子克家剛柔接也指二五之應纂注程子曰二五剛柔之情相接故得行其剛中之道成發蒙之功茍非上下之情親二雖剛中安能尸其事乎勿用取女行不順也順當作慎蓋順慎古字通用荀子順墨作慎墨且行不慎於經意尤親切困蒙之吝獨逺實也實協韻去聲纂注徐氏曰剛實發蒙四獨逺之困於蒙者也故吝童蒙之吉順以巽也愚謂順以爻柔言巽以巽志應二言利用禦寇上下順也禦寇以剛上下皆得其道附録上九一陽而衆隂隨之如人皆順從於我故能禦寇須是自家屋裏人從我方能去理會外頭人若自家屋裏人不從時如何去禦得寇所以象曰上下順也輝雲上於天需君子以飲食宴樂雲上於天無所復為待其隂陽之和而自雨爾事之當需者亦不容更有所為但飲食宴樂俟其自至而已一有所為則非需也附録問屯需二象皆隂陽未和洽成雨之象然屯言經綸而需言飲食宴樂何也曰需是緩意在他無所致力只得飲食宴樂屯是物之始生象草木出地之狀其初出時欲破地面而出不無齟齬艱難故當為經綸其義不同時舉纂注程子曰君子觀象懷其道義安以待時飲食以養其氣體宴樂以和其心志所謂居易以俟命也愚謂飲食坎象宴樂樂天也乾象需于郊不犯難行也利用恆無咎未失常也需于沙衍在中也雖小有言以吉終也衍寬意以寬居中不急進也需于泥災在外也自我致寇敬慎不敗也外謂外卦敬慎不敗發明占外之占聖人示人之意切矣附録銖問占外之占何也曰象中本無此意占者不可無此意所謂占外意也銖孔子雖説推明義理這般所在又變例推明占筮之意需于泥災在外占得此象雖若不吉然能敬慎則不敗又能忍以需待處之得其道所以不凶或失其剛健之德又無堅忍之志則不能不敗矣文蔚纂注丘行可曰寇坎也三既迫坎則害己切己故曰致寇至夫坎險在外未嘗迫人由人急於求進自迫於險以致禍敗象以自我釋之明致災之由不在他人也然於此能以敬慎自處則亦不至於敗也需于血順以聽也纂注丘行可曰需之三四乾坎之會也三恃健冒險而進四據險以待乾之來聖人於三之象以敬告之能敬則不犯坎矣於四之象以順告之能順則不忤乾矣二者交盡其道此處需之要也酒食貞吉以中正也不速之客來敬之終吉雖不當位未大失也以隂居上是為當位言不當位未詳附録凡初上二爻階無位二士三卿大夫四大臣五君位上六之不當位如父母老不任家事而退間僧家之有西堂之類銖纂注蔡氏曰敬故未大失天與水違行訟君子以作事謀始天上水下其行相違作事謀始訟端絶矣不永所事訟不可長也雖小有言其辨明也不克訟歸逋竄也自下訟上患至掇也掇自取也纂注程子曰自下而訟其上義乖勢屈禍患之至猶掇拾而取之言易得也食舊德從上吉也從上吉謂隨人則吉明自主事則無成功也復即命渝安貞不失也訟元吉以中正也中則聽不偏正則斷合理以訟受服亦不足敬也地中有水師君子以容民畜衆水不外於地兵不外於民故能養民則可以得衆矣纂注劉夀翁曰古者兵農合一居則為比閭族黨之民役則為伍兩軍旅之衆此衆即此民也故曰水不外於地兵不外於民君子觀象容之畜之於無事之時用之於有事之日故曰能養民則可以得衆矣師出以律失律凶也在師中吉承天寵也王三錫命懷萬邦也纂注程子白在師中吉者以其承天之寵任也天謂上也人臣非君竉任之則安得專征之權而有成功之吉象以二專主其事故發此義王三錫以恩命褒其成功所以懷萬邦也師或輿尸大無功也左次無咎未失常也知難而退師之常也長子帥師以中行也弟子輿尸使不當也大君有命以正功也小人勿用必亂邦也聖人之成深矣地上有水比先王以建萬國親諸侯地上有水水比於地不容有間建國親侯亦先王所以比於天下而無間者也彖意人來比我此取我往比人附録伊川言建萬國以比民言民不可盡得而比故建諸侯使比民而天子所親者諸侯而已這便是他比天下之道淵纂注程子曰親比而無間者莫如水在地上所以為比也先王觀比之象以建萬國親諸侯建立萬國所以比民親撫諸侯所以比天下也比之初六有他吉也比之自內不自失也得正則不自失矣纂注程子曰守己中正之道以待上之求乃不自失也比之匪人不亦傷乎纂注徐氏曰三居不正之位而應上比之匪人也上比無首而凶己乃應之亦可傷矣馬援勸隗囂専意東方而隗囂降蜀至於殺身亡宗為天下笑者非大可傷乎外比於賢以從上也顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也由上之德使不偏也比之無首無所終也以上下之象言之則為無首以始終之象言之則為無終無首則無終矣風行天上小畜君子以懿文德風有氣而無質能畜而不能久故為小畜之象懿文德言未能厚積而逺施也復自道其義吉也牽復在中亦不自失也亦者承上爻義夫妻反目不能正室也程子曰説輻反目三自為也纂注程子曰隂制於陽者也今反制陽如夫妻之反目也反目謂怒目相視不順其夫而反制之也婦人為夫寵惑既而遂反制其夫未有夫不失道而妻能制之也故説輻反目三自為也三自處不以道故四得制之不使進猶夫不能正室家故致反目也有孚惕出上合志也有孚攣如不獨富也既雨既處德積載也君子征凶有所疑也纂注疑均敵也柔畜既盛必敵剛也蔡氏上天下澤履君子以辨上下定民志程傳備矣纂注程子曰天在上澤居下上下之正理也人之所履當如是故取其象而為履君子觀履之象以辨别上下之分以定其民志夫上下之分明而後民志有定民志定然後可以言治民志不定天下不可得而治也古之時公卿大夫而下位各稱其德終身居之得其分也位未稱德則君舉而進之士修其學學至而君求之皆非有預於已也農工商賈勤其事而所享有限故皆有定志而天下之心可一後世自庶士至於公卿日至於尊榮農工商賈日至於富侈億兆之心交騖於利天下紛然如之何其可一也欲其不亂難矣此由上下無定志也君子觀履之象而分辨上下使各當其分以定民之心志也素履之往獨行願也纂注程子曰安履其素而往者非茍利也獨行其志願耳若欲貴之心與行道之心交戰於中豈能安履其素也幽人貞吉中不自亂也纂注徐氏曰上無應與而獨善其身日用常行坦然平易不為艱難阻絶之行自守以正而外物不亂所以吉也眇能視不足以有明也跛能履不足以與行也嘻人之凶位不當也武人為于大君志剛也訴訴終吉志行也夬履貞厲位正當也傷於所恃元吉在上大有慶也若得元吉則大有福慶也天地交泰后以財成天地之道輔相天地之宜以左右民財成以制其過輔相以補其不及附録問聖人財成輔相之功當無時而不然何獨於泰卦言之曰天地交泰萬物各遂其理聖人自此方能致用若天地閉塞萬物不生聖人亦無所施其巧輝財成猶裁截成就之也輔相只於財成處以補其不及而已財成眼前皆可見且如君臣父子兄弟夫婦聖人為制下許多禮數倫序只此便是財成處至大至小之事皆是固是萬物本有此道理若非聖人財成亦不能得如此齊整此皆天地之所不能為而聖人能之所以贊天地之化育而功與天地參也又問繼天立極曰天只生得許多人物與許多道理然天却自做不得所以必得聖人為之修道立教以教化百姓所謂財成天地之道輔相天地之宜是也蓋天做不得底須聖人為他做也又問輔相財成學者日用處有否曰飢食渴飲冬裘夏葛耒耜罔罟皆是僴財成是裁做段子底輔相是佐助他底天地之化儱侗相續下來聖人便裁作段子如氣化一年一周聖人與他截做春夏秋冬四時淵問乾健坤順如何得有過不及之差曰乾坤者一氣運於無心不能無過不及之差聖人有心以為之主故無過不及之失所以天地之功必有待於聖人長孺纂注蔡氏曰天地之道謂日月寒暑之往來東西南北之經緯天地之宜謂春生秋殺髙黍下稻於道則制裁其節於宜贊助之而已又曰天地之道以氣形全體言天地之宜以時勢所適言財成者因其全體而裁制其節使不過輔相者隨其所宜而贊助其所不及如氣化流行籠統相續聖人則為之裁制以分春夏秋冬之節地形廣邈經緯交錯聖人則為之裁制其東西南北之限此財成天地之道也春生秋殺此時運之自然髙黍下稻此地勢之所宜也聖人則輔相之使當春而耕當秋而斂髙者種黍下者種稻此輔相天地之宜也拔茅征吉志在外也纂注蔡氏曰在外謂應隂也隂為民君子在內則恩澤及乎民也包荒得尚于中行以光大也無往不復天地際也纂注徐氏曰乾坤相遇之際泰否反復之機實在於此可不戒哉翩翩不富皆失實也不戒以孚中心願也隂本居下在上為失實以祉元吉中以行願也纂注徐氏曰中以行願居中應二行其志願非勉強也城復于隍其命亂也命亂故復否告命所以治之也天地不交否君子以儉德辟難不可榮以祿收斂其德不形於外以辟小人之難人不得以祿位榮之纂注蔡氏曰天地不交二氣鬱塞否之象也順陽消之象而晦處窮約也拔茅貞吉志在君也小人而變為君子則能以愛君為念而不計其私矣大人否亨不亂羣也言不亂於小人之羣包羞位不當也纂注程子曰隂柔居否不中不正所為可羞者處不當故也處不當位所為不以道也有命無咎志行也大人之吉位正當也纂注程子曰有大人之德而得至尊之正位故能休天下之否是以吉也無其位則雖有其道將何為乎故聖人之位謂之大寶否終則傾何可長也纂注程子曰豈有長否之理極而必反理之常也天與火同人君子以類族辨物天在上而火炎上其性同也類族辨物所以審異而致同也附録類族如青底做一類白底做一類恁地類了同底自同異底自異淵類族是就人上説辨物是就物上説天下有不可以皆同之理故隨他地頭去分别類族如分姓氏張姓作一類李姓作一類辨物如牛是一類馬是一類就其異處以致其同此其所以為同學家纂注馮氏曰類族是如天之兼覆辨物是如火之燭照出門同人又誰咎也纂注程子曰出門同人所同者廣無所偏私人之同也有厚薄親疏之異過咎所由生既無偏黨誰其咎之同人于宗吝道也伏戎于莽敵剛也三嵗不興安行也言不能行纂注蔡氏曰敵謂五安何也安往而不得貧賤之安乘其墉義弗克也其吉則困而反則也乘其墉矣則非其力之不足也特以義之弗克而不攻耳能以義斷困而反於法則故吉也同人之先以中直也大師相遇言相克也直謂理直同人于郊志未得也纂注蔡氏曰未及乎野未盡乎大同之道故曰志未得也火在天上大有君子以遏惡揚善順天休命火在天上所照者廣為大有之象所有既大無以治之則釁蘖萌於其間矣天命有善而無惡故遏惡揚善所以順天反之於身亦若是而已矣附録天道喜善而惡惡遏惡而揚善非順天休命而何蓋卿堯舜之治既舉元凱必放共兜此易所謂遏惡揚善順天休命者也蓋善者天理之本然惡者人欲之邪妄是以天之為道既福善禍淫又以賞罰之權寄之司牧使之有補助其禍福之所不及戊申封事纂注蔡氏曰遏惡揚善離象順天休命乾象大有初九無交害也大車以載積中不敗也公用亨于天子小人害也纂注程子曰民衆財豐反擅其富強益為不順是小人大有則為害又大有為小人之害匪其彭無咎明辨晢也晢明貌纂注蔡氏曰居離明之始故能辨其理之必至厥孚交如信以發志也一人之信足以發上下之志也威如之吉易而無備也太柔則人將易之而無畏備之心大有上吉自天祐也地中有山謙君子以裒多益寡稱物平施以卑藴髙謙之象也裒多益寡所以稱物之宜而平其施損髙增卑以趨於平亦謙之意也附録問謙是損髙就低使教恰始曰大抵人多見得在己者髙在人者卑謙則抑己之髙而卑以下人便是平也學蒙臣伏見近年百事多務含容曲直是非兩無所問似聞聖意謂如此處置方得均平然臣切有疑焉易象曰稱物平施蓋古之欲為平者必稱其物之大小髙下而為其施之多寡厚薄然後乃得其平若不問其是非曲直而待之如一則是善者常不得伸而惡者反幸而免以此為平是乃所以為大不平也戊申封事謙謙君子卑以自牧也纂注程子曰自牧自處也詩云自牧歸荑蔡氏曰牧養也鳴謙貞吉中心得也勞謙君子萬民服也纂注蔡氏曰萬民衆柔義無不利撝謙不違則也言不為過利用侵伐征不服也纂注蔡氏曰不服謂四鳴謙志未得也可用行師征邑國也隂柔無位才力不足故其志未得而至於行師然亦適足以治其私邑而已纂注邱行可曰二與上皆曰鳴謙以有感乎三也然柔近剛則先得乎剛二比三近也故中心得上應三逺也故志未得雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考雷出地奮和之至也先王作樂既象其聲又取其義殷盛也附録象其聲者謂雷取其義者謂和崇德謂著其德作樂所以發揚其德時舉先王作樂其功德便自不可掩砥問崇德如大韶大武之類否曰是先王作樂無處不用如宴饗飲食之時無不用此特言其大者爾學蒙纂注程子曰雷者陽氣奮發隂氣相薄而成聲陽始潛閉地中及其動則出地奮震也始閉鬱及奮發則通達和豫故為豫也坤順震動和順積中而發於聲樂之象也潘氏曰樂之為用朝覲聘饗祭祀各有所主惟郊祀上帝則大合古今衆樂而奏之大司樂圜丘之奏樂極九變是也故曰殷薦之上帝以配祖考郊祀后稷以配天配以祖也宗祀文王於明堂以配上帝配以考也初六鳴豫志窮凶也窮謂滿極不終日貞吉以中正也盱豫有悔位不當也由豫大有得志大行也六五貞疾乘剛也恆不死中未亡也冥豫在上何可長也澤中有雷隨君子以嚮晦入宴息雷藏澤中隨時休息纂注馮氏曰雷發聲於震之春收聲於兊之秋由震而兊雷藏澤中與時休息為隨時之象日出於東方之震而入於西方之兊由震而兊自明嚮晦出於明者至晦而入也勞者宴作者息矣所以用隨也天地之隨為晝夜為寒暑為古今君子之隨為動息為語默為行藏一晝一夜之頃而動息隨之況於消息盈虛之大者乎黃宗台曰卦爻取隨時而動大象取隨時而息官有渝從正吉也出門交有功不失也係小子弗兼與也纂注程子曰人之所隨得正則逺邪從非則失是無兩從之理二茍係初則失正矣弗能兼與也故以戒人從正當専一也係大夫志舍下也隨有獲其義凶也有孚在道明功也孚于嘉吉位正中也拘係之上窮也窮極也山下有風蠱君子以振民育德山下有風物壞而有事矣而事莫大於二者乃治己治人之道也附録當蠱之時必有以振起聳動民之觀聽而在己進德不已必須有此二者則可以治蠱矣振民有風之象育德有山之象纂注徐氏曰山下有風風薄山而回物皆散亂蠱之象也愚謂育德山象如山之養成材力也幹父之蠱意承考也纂注鄭氏曰子改父道始雖勞而終則吉蓋其事若不順而其意則在於承其父也幹母之蠱得中道也幹父之蠱終無咎也裕父之蠱往未得也幹父用譽承以德也不事王侯志可則也澤上有地臨君子以教思無窮容保民無疆地臨於澤上臨下也二者皆臨下之事教之無窮者兊也容之無疆者坤也纂注蔡氏曰教思無窮澤潤地之象也容保民無疆地容澤之象也咸臨貞吉志行正也咸臨吉無不利未順命也未詳纂注蔡氏曰命君命謂五也徐氏曰二剛咸臨有進逼陵躐之勢五柔二剛有君弱臣強之疑以此相臨豈能遽合自二言之其初未順命也然五以柔中用二二以剛中應五豈終不順哉聖人以未順命釋之欲人知以道事君而不茍於從上也甘臨位不當也既憂之咎不長也至臨無咎位當也大君之宜行中之謂也敦臨之吉志在內也風行地上觀先王以省方觀民設教省方以觀民設教以為觀纂注程子曰風行地上周及庶物為遊歷周覽之象故先王體之為省方之禮以觀民俗而設政教也設教者如奢則約之以儉儉則示之以禮是也省方觀民也設教為民觀也初六童觀小人道也窺觀女貞亦可醜也在大夫則為醜也觀我生進退未失道也觀國之光尚賔也觀我生觀民也此夫子以義言之明人君觀已所行不但一身之得失又當觀民德之善否以自省察也觀其生志未平也志未平言雖不得位未可忘戒懼也雷電噬嗑先王以明罰敕法雷電當作電雷附録通論豐象噬嗑明在上動在下是明得事理先立這法在此未有犯底人留待異時之用故云明罰敕法豐威在上明在下是用這法時須用明見下情曲折方得不然威動於上必有過錯也故折獄致刑此是伊川意其説極好道夫纂注程子曰象無倒置者疑此文互也雷電相須並見之物亦有嗑象電明而雷威先王觀電雷之象法其明與威以明其刑罰敕其法令法者明事理而為之防者也蔡氏曰明罰離象敕法震象徐氏曰明罰者所以示民而使之知所避敕法者所以防民而使之知所畏此先王忠厚之意也未至折獄致刑處故與豐象異然罰之當避人猶有冒罰而為之法之可畏人猶有犯法而不顧者先王不得已而後用刑也屨校滅趾不行也滅趾又有不進於惡之象噬膚滅鼻乘剛也遇毒位不當也利艱貞吉未光也貞厲無咎得當也何校滅耳聰不明也滅耳蓋罪其聽之不聰也若能審聽而早圖之則無此凶矣山下有火賁君子以明庶政無敢折獄山下有火明不及逺明庶政事之小者折獄事之大者內離明而外艮止故取象如此附録明庶政是就離上説無敢折獄是就艮上説政是事之小者可以用明獄是六事一折便了明在內不能及他故止而不敢折也學蒙通論旅卦象賁內明外止雖然內明是箇止殺底明所以不敢用其明以折獄與山上有火旅居子以明謹用刑而不留獄相似而相反賁內明外止旅外明內止其象不同如此僴問茍明見其情罪之是非亦何難於折獄曰是他自有箇象如此遇著此象底便用如此然獄亦自有出三八捧便了底亦有須待囚訊鞫勘録問結證而後了底書曰要囚服念五六日至于旬時丕蔽要囚周禮秋官亦有此數語便是有合如此者若獄未具而決之是所謂敢決獄也若獄已具而留之不決是所謂留獄也不留獄者謂訊囚結證已畢而即決之也僴止在外明在內故明政而不敢折獄止在內明在外故明慎用刑而不留獄又曰如今州郡治獄禁勘審覆自有許多節次過乎此而不決便是留獄不及乎此而決便是敢於折獄纂注蔡氏曰有山之材而照之以火則尤彩外著賁之象也明庶政離明象政者治之具所當文飾也無敢折獄艮止象折獄貴乎情實賁則文飾而沒其情矣舍車而徒義弗乘也君子之取舍決於義而已纂注蔡氏曰處卦最下亦理無可乘之者故曰義弗乘也賁其須與上興也永貞之吉終莫之陵也纂注蔡氏曰陵侮也三能永貞則二柔雖比已而端如然終莫之陵侮而不全陷溺也六四當位疑也匪寇婚媾終無尤也當位疑謂所當之位可疑也終無尤謂若守正而不與亦無他患也六五之吉有喜也白賁無咎上得志也附録問何謂得志曰居卦之上在事之外不假文飾而有自然之文便是優遊自得也銖山附於地剝上以厚下安宅附録厚下者乃所以安宅如山附於地惟其地厚所以山安其居而不搖人君厚下以得民則位亦安而不搖猶所謂本固邦寧也僴纂注蔡氏曰厚下坤象安宅艮象劉夀翁曰厚下安宅此言治剝之道愚謂剝者崩頽之義五隂自下而上剝一陽將見艮剝為坤則山剝為地矣山附於地未可言剝然以五隂剝一陽言之則有山崩為地之勢故名之曰剝為人上者觀象而知所以厚下安宅則又善於用剝者也剝牀以足以滅下也剝牀以辨未有與也言未大盛纂注程子曰隂之剝陽得以益盛者以陽不有與故也小人剝君子若君子有與則可以勝小人不能為害矣言未有與剝之未盛有與猶可勝也示人之意深矣邱行可曰與應也凡隂陽相應則為有與困九四應六五言有與是也隂陽不應則為無與井九二不應九五言無與是也咸六爻皆應則謂感應以相與艮六爻皆不應則謂之敵應不相與剝之未有與者是言當剝之時在上未有陽以應隂無以止隂之進也大凡小人為害使其間有一君子與之為應以遏止之則其心猶有所顧忌而不敢肆使雖為惡未至如是之甚也惟其未有與此剝道所以進長而不可救也聖人於此不謂之無與而謂之未有與蓋不忍隂邪之害正而猶冀有人以止之也其意深矣亦通剝之無咎失上下也上下謂四隂剝牀以膚切近災也以宫人寵終無尤也君子得輿民所載也小人剝廬終不可用也雷在地中復先王以至日閉關商旅不行后不省方安靜以養微陽也月令是月齋戒掩身以待隂陽之所定附録至日閉關正是於已動之後要以安靜養之蓋一陽初復陽氣甚微勞動他不得故當安靜以養微陽如人善端初萌正欲靜以養之方能盛大銖古人所以四十強而仕者前面許多年亦且養其善端若一下便出來與事物衮了豈不壞事賀孫不逺之復以修身也附録易傳惟其知不善則速改以從善這般説語好簡當文蔚休復之吉以下仁也纂注徐氏曰仁謂初剛剛復於下在人則惻隱之心仁之端也初不逺復二從初而復故曰以下仁也頻復之厲義無咎也中行獨復以從道也敦復無悔中以自考也考成也纂注程子曰五處中而體順能敦篤其志以中道自成可以無咎自成謂成其中順之德迷復之凶反君道也纂注劉夀翁曰動靜天道之復也善惡人道之復也故彖象言動靜之復六爻皆言善惡之復復者剛之反也自五及初皆以從剛為復五之自考不如四之從道四之從道不如二之下仁二之下仁不如初之修身三頻復雖危猶知復也上迷復反道則不知復矣徐氏曰上六位髙而無下仁之美剛逺而失遷善之機厚極而有難開之蔽柔終而無改過之勇是昏迷而不知復者也天下雷行物與無妄先王以茂對時育萬物天下雷行震動發生萬物各正其性命是物物而與之以無妄也先王法此以對時育物因其所性而不為私焉無妄之往得志也不耕穫未富也富如非富天下之富言非計其利而為之也行人得牛邑人災也可貞無咎固有之也有猶守也無妄之藥不可試也既已無妄而復藥之則反為妄而生疾矣試謂少嘗之也無妄之行窮之災也天在山中大畜君子以多識前言往行以畜其德天在山中不必實有其事但以其象言之耳附録書雖是古人書今日讀之所以畜自家之德道夫通論小畜象山是堅剛之物故能力畜三陽風是柔軟之物止能小畜之而已時舉大畜多識前言往行以畜其德小畜只做得這些文德如威儀文辭之類淵纂注程子曰天至大而在山之中所畜至大之象君子觀象以大其藴畜人之藴畜由學而大在多聞前古聖賢之言與行考迹以觀其用察言以求其心識而得之以成其德大畜之義也有厲利已不犯災也輿説輹中無尤也利有攸往上合志也六四元吉有喜也六五之吉有慶也何天之衢道大行也山下有雷頤君子以慎言語節飲食二者養德養身之切務附録或云諺有禍從口出病從口入甚好曰前輩曽用以解慎言語節飲食廣纂注程子曰慎言語以養其德節飲食以養其體蔡氏曰慎節主靜艮象言語飲食主動震象觀我朵頥亦不足貴也六二征凶行失類也初上皆非其類也十年勿用道大悖也顛頤之吉上施光也居貞之吉順以從上也由頤厲吉大有慶也澤滅木大過君子以獨立不懼遁世無悶澤滅於木大過之象也不懼無悶大過之行也附録澤在上木在下澤水髙漲浸沒了木是為大過木雖為水浸而未嘗動故君子觀之而獨立不懼遁世無悶也砥纂注蔡氏曰獨立不懼巽木象遁世無悶兊説象藉用白茅柔在下也老夫女妻過以相與也棟橈之凶不可以有輔也棟隆之吉不橈乎下也枯楊生華何可久也老婦士夫亦可醜也過涉之凶不可咎也附録不可咎是他做得是了不可咎他砥水洊至習坎君子以常德行習教事治己治人皆必重習然後熟而安之纂注蔡氏曰常德行坎剛中象習教事重坎象習坎入坎失道凶也求小得未出中也來之坎坎終無功也樽酒簋二剛柔際也陸氏釋文本無二字今從之坎不盈中未大也有中德而未大附録水之為物其在坎只能平自不能盈故曰不盈盈髙之義中未大者平則是得中不盈是未大也砥上六失道凶三嵗也明兩作離大人以繼明照于四方作起也附録明兩作猶言水洊至今日明來日又明若説兩明却是兩箇日頭淵明便是指日而言砥履錯之敬以辟咎也黃離元吉得中道也日昃之離何可久也突如其來如無所容也無所容言焚死棄也六五之吉離王公也王用出征以正邦也易附録纂注卷五
