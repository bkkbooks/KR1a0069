body:
  text: 易附録纂注卷十二元胡一桂撰總論雜卦雜卦反對之義只是反覆則其吉凶禍福動靜剛柔皆相反了答虞大中乾剛坤柔附録剛柔雖各有所偏必相錯而後得中然在乾坤二卦之全體當剛而剛當柔而柔則不待相錯而不害其全矣其爻位之無過不及者如乾坤之二五亦不待相錯而不害其為中矣隂陽變化而太極之妙無不在焉於此蓋可見也今謂乾剛坤柔便有所偏恐於二卦之彖及二五之爻有不通者答虞大中比樂師憂臨觀之義或與或求以我臨物曰與物來觀我曰求或曰二卦互有與求之義附録臨觀更有與求之義臨以二陽言之則二陽可以臨上四隂以卦中爻言之則六五上六又以上而臨下觀自下而觀上則為觀是平聲自上而為物之觀是去聲道夫屯見而不失其居蒙雜而著屯震遇坎震動故見坎險不行也蒙坎遇艮坎幽昧艮光明也或曰屯以初言蒙以二言纂注蔡氏曰屯物之始生故見主初也未得位而利居貞故不失其居蒙然而生故雜二為蒙主而能治之使明故著震起也艮止也損益盛衰之始也纂注蔡氏曰震陽起於下艮陽止於上損者盛之始益者衰之始大畜時也無妄災也止健者時有適然無妄而災自外至纂注蔡氏曰剛健者難畜當剛止之時故能畜莫非災也無妄之災乃所謂災也萃聚而升不來也纂注蔡氏曰澤聚而下木升而上謙輕而豫怠也附録謙輕是自謙抑不自尊重道夫輕是自卑小之義說豫之極便放倒了如上文冥豫是也去僞噬嗑食也賁無色也白受采纂注蔡氏曰頤中有物故食賁則其色不常故無色兊見而巽伏也兊隂外見巽隂內伏隨無故也蠱則飭也隨前無故蠱後當飭剝爛也復反也纂注蔡氏曰剝則陽爛復則陽反晉晝也明夷誅也誅傷也纂注蔡氏曰晉離在上而明著夷離在下而明傷井通而困相遇也剛柔相遇而剛見掩也纂注蔡氏曰井往而不窮故為通困剛掩也剛與柔相遇也咸速也恆久也咸速恆久纂注蔡氏曰有感則應故速常故能久渙離也節止也纂注蔡氏曰風散水故離澤防水故止解緩也蹇難也附録散緩意如縱弛之類道夫睽外也家人內也否泰反其類也大壯則止遁則退也止謂不退纂注蔡氏曰大壯隂止遁陽退徐氏曰雜卦言止者三艮止也謂陽升於上止而不進天之道也節止也謂有所限節而遏止之人之力也大壯則止謂四陽方壯止而不退亦天道也大有衆也同人親也革去故也鼎取新也小過過也中孚信也纂注蔡氏曰莫非過也小過之過乃所謂過也小者能過豈常理哉莫非信也中孚之信乃所謂信也信出於中豈要約之所能致哉豐多故也親寡旅也既明且動其故多矣離上而坎下也火炎上水潤下小畜寡也履不處也不處行進之義需不進也訟不親也大過顛也纂注徐氏曰本末弱故顛姤遇也柔遇剛也漸女歸待男行也附録女待男而行所以為漸淵頤養正也既濟定也纂注蔡氏曰六位皆當故定歸妹女之終也未濟男之窮也附録伊川說未濟男之窮為三陽失位以為斯義也得之成都隱者見張欽夫說伊川之在涪也一日讀易有刳桶人以此問伊川伊川不能答其人云三陽失位故伊川記之不知此語火珠林上已有蓋伊川未嘗看雜書所以被他說動了淵夬決也剛決柔也君子道長小人道憂也自姤以下卦不反對或疑其錯簡今以韻協之又似非誤未詳何義纂注蔡氏曰自姤以下有亂簡按雜卦例皆反對協韻為序今以其例改正大過顛也頤養正也既濟定也未濟男之窮也歸妹女之終也漸女歸待男行也姤遇也柔遇剛也夬決也剛決柔也君子道長小人道憂也愚謂雜卦以乾為首不終之以他卦而必終之以夬者蓋夬以五陽決一隂決去一隂則復為乾矣故曰君子道長小人道憂也易為君子謀大哉言矣易附録纂注卷十二
