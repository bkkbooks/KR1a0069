body:
  text: 易附録纂注易𩔖提要臣等謹案易附録纂注十五卷元胡一桂撰一桂字庭芳號雙湖婺源人景定甲子領鄉薦試禮部不第教授鄉里以終事迹具元史儒學傳是編以朱子本義為宗取文集語録之及於易者附之謂之附録取諸儒易說之合於本義者纂之謂之纂注其去取别裁惟以朱子為斷元史稱其受易源流出於朱子殆以啟䝉翼傳及是書歟陳櫟稱一桂此書於楊萬里易傳無半字及之今檢其所引櫟說信然葢宋末元􅀄講學者門户最嚴而新安諸儒於授受源流辨别尤甚萬里易傳雖逺宗程子而早工吟詠與范成大陸㳺齊名不甚以講學為事故雖嘗薦朱子拒韓􅇑胄而慶元黨禁獨不列名一桂葢以詞人擯之未必盡以其書也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:eacb5658b2a9540109bfa5bb2f5f07b4d1a6f393e91aa71c38de563c00f0e3d1
