body:
  text: 易附録纂注卷八元胡一桂撰八卦成列象在其中矣因而重之爻在其中矣成列謂乾一兊二離三震四巽五坎六艮七坤八之類象謂卦之形體也因而重之謂各因一卦而以八卦次第加之為六十四也爻六爻也既重而後卦有六爻也附録八卦所以成列乃是從太極兩儀四象漸次生出以至於此畫成之後方見其有三才之象非聖人因見三才遂以已意思惟而連畫三爻以象之也因而重之亦是因八卦之已成各就上面接次生出逐爻則更加三變方成六十四卦若待生全卦則只用一變便成六十四卦雖有遲速之不同然皆自然漸次生出各有行列次第畫成之後然後見其可盡天下之變不是聖人見下三爻不足以盡天下之變然後别生計較又并畫上三爻以盡之也此等皆是作易妙處方其畫時雖是聖人亦自不知裏面有許多巧妙竒特直是要人細心體認不可草草立說答袁樞剛柔相推變在其中矣繫辭焉而命之動在其中矣剛柔相推而卦爻之變往來交錯無不可見聖人因其如此而皆繫之辭以命其吉凶則占者所值當動之爻象亦不出乎此矣附録變是就剛柔交錯而成卦爻上言動是専指當占之爻言如二爻變則占者以上爻為主這上爻便是動如五爻變一爻不變則占者以不變爻為主則這不變底便見動處也學蒙吉凶悔吝者生乎動者也吉凶悔吝皆辭之所命也然必因卦爻之動而後見剛柔者立本者也變通者趣時者也一剛一柔各有定位自此而彼變以從時附録此兩句亦相對說剛柔者隂陽之質是移不得之定體故謂之本若剛變為柔柔變為剛便是變通之用必大剛柔兩箇是本變通便只是其往來者學蒙互論上繫剛柔者立本者也變通者趣時者也便與變化者進退之象也剛柔者晝夜之象也一樣學蒙剛柔者晝夜之象所謂立本變化者進退之象所謂趣時文蔚纂注蔡氏曰剛柔者變通之本體變通者剛柔之時用吉凶者貞勝者也貞正也常也物以其所正為常者也天下之事非吉則凶非凶則吉常相勝而不已也附録問貞勝一段張程之說孰是曰吉凶二者常須有一箇勝故曰貞勝貞所以訓常者易𫝊解此處多云正固固乃常也為正字盡貞不得故又著一固字謂如雖是正又須常固守之然後為貞纂注張子曰有義命當吉當凶當亨當否者聖人不使避凶趣吉一以貞勝而不顧如大人否亨有隕自天過涉滅頂凶無咎損益龜不克違及其命亂之類三者情異不可不察按朱子曰張子貞勝之說雖非經㫖然其說亦自好便只行得他說有甚不可大凡看人解經雖有與經意稍逺然其說是底自是一說不可廢他又曰吉凶以貞勝有雖凶而不可避者縱貧賤窮困死亡却非悔吝故橫渠云不可避凶趣吉一以貞勝者是也天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也觀示也天下之動其變無窮然順理則吉逆理則凶則其所正而常者亦一理而已矣附録天地之道則常示日月之道則常明天下之動雖不齊常有一箇是底故曰貞夫一文蔚夫乾確然示人易矣夫坤隤然示人簡矣確然健貌隤然順貌所謂貞觀者也爻也者效此者也象也者像此者也此謂上文乾坤所示之理爻之竒偶卦之消息所以效而象之附録問效此是效乾坤之變化而分六爻像此是像乾坤之虛實而為竒偶曰效此便是乾坤之理象只是像其竒偶學蒙爻象動乎內吉凶見乎外功業見乎變聖人之情見乎辭內謂蓍卦之中外謂蓍卦之外變即動乎內之變辭即見乎外之辭附録生生問曰如何是爻象動乎內吉凶見乎外如何分或曰隂陽老少在分掛揲歸之時而吉凶乃見於成卦之後曰也是如此然內外字猶言先後顯微學蒙功業見乎變是就那動底爻見得這功業字似吉凶生大業之業猶言事變庶事相似學蒙天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義曰人之人今本作仁吕氏從古蓋所謂非衆罔與守邦此第一章言卦爻吉凶造化功業附録天地以生物為心蓋天地之間品物萬形各有所事唯天確然於上地隤然於下一無所為只以生物為事故易曰天地之大德曰生而程子亦曰天只是以生為道答欽夫後世只為這兩箇不相對有位底無德有德底無位有位則事事做得淵理財言你底還你我底還我正辭言是底說是不是底說不是猶所謂正名淵問人君臨天下大事小事只是理財正辭如何曰理財是因上文而言聚得許多人在這裏無財何以養之有財不能理却也不得正辭便只是分别是非又曰教化便却在正辭裏面了學蒙古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情王昭素曰與地之間諸本多有天字俯仰逺近所取不一然不過以驗隂陽消息兩端而已神明之德如健順動止之性萬物之情如雷風山澤之象附録文蔚曰先生易中謂伏羲作易驗隂陽消息兩端而已此語最盡曰隂陽雖是兩箇字然却是一氣之消息一進一退一消一長進處便是陽退處便是隂長處便是陽消處便是隂只是這一氣之消息做出古今天地間無限事來所以隂陽做一箇說亦得做兩箇說亦得古者伏羲觀鳥獸之文與地之宜那時未有文字只是仰觀俯察而已想得聖人心細雖以鳥獸羽毛之微也盡察得有隂陽今人心粗如何察得或曰伊川見兔曰察此亦可畫卦便是此義曰就這一端上亦可以見耳凡草木禽獸無不有隂陽鯉魚脊上有三十六鱗龍脊上有八十一鱗龍不曽見鯉魚有之又龜背上文中間一簇成五段文兩邊各插四段共成八文又八文之外兩邊周圍共二十四段中間五段者五行也兩邊插八段者八卦也周圍二十四段者二十四氣也箇箇如此又如草木之有雌雄銀杏桐楮牝牡麻竹之類皆然又樹木向陽處則堅實其背隂處必虛軟男生必伏女生必偃蓋男陽氣在背女陽氣在腹僴聖人作易之初益是仰觀俯察見得盈乎天地之間者無非一隂一陽之理有是理則有是象有是象則其數便自在這裏非特圖書為然蓋所謂數者祗是氣之分限節度處得陽必竒得隂必偶凡物皆然而圖書特為巧而著耳賀孫萬物之情盡於八卦而震巽坎離艮兊又總於乾坤曰動曰陷曰止皆健底意思曰麗曰說曰入皆順底意思聖人下此八字極狀得八卦情盡必大纂注蔡氏曰聖人所畫之卦精可以通神明之德粗可以類萬物之情神明之德不可見者也故曰通萬物之情可見者也故曰類作結繩而為罔罟以佃以漁蓋取諸離兩目相承而物麗焉附録蓋取等字乃摹樣是恁地纂注徐氏曰離體中虛兩目相承而物麗之罔罟之象包犧氏沒神農氏作斫木為耜揉木為耒耒耨之利以教天下蓋取諸益二體皆木上入下動天下之益莫大於此附録問本義上入下動於卦義則是於取象有所未曉曰耜乃今之鏵胡爪切鍬七消切耒乃鏵柄雖是下入必竟是上面用力方得入學蒙蓋字便是一個半間半界底字如取諸益離不是先有見乎離而後為網罟先有見乎益而後為耒耜之屬聖人亦只是見魚鱉之屬欲有以取之遂做物事去攔截他欲得耕種見土地硬遂做物事去剔起他却合於離之象合於益之象又曰有取其象者有取其意者賀孫日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑日中為市上明而下動又借噬為市嗑為合也纂注蔡氏曰天下之民不同業天下之貨不同用致而聚者噬而嗑之之義也神農氏沒黃帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天祐之吉無不利黃帝堯舜垂衣裳而天下治蓋取諸乾坤乾坤變化而無為附録黃帝堯舜氏到這時候合當如此變易窮則變道理亦如此垂衣裳而天下治是大變他以前底事了淵通其變須是得一箇人通其變若聽其自變如何得賀孫纂注蔡氏曰乾上坤下垂衣裳而治之義刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下蓋取諸渙木在水上也致逺以利天下疑衍服牛乘馬引重致逺以利天下蓋取諸隨下動上說纂注蔡氏曰服乘皆隨之義重門擊柝以待暴客蓋取諸豫豫備之意附録重門擊柝以待暴客只是豫備之意却須待用互體推艮為門闕雷震乎外之意弦木為弧剡木為矢只是睽乖故有威天下之象亦必待穿鑿附㑹就卦中推出制器之義殊不知卦中但有此理而已所以孔子各以蓋取諸某卦言之初亦不過謂其大意云耳謨斷木為杵掘地為臼􅍫杵之利萬民以濟蓋取諸小過下止上動弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽睽乖然後威以服之上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯壯固之意纂注蔡氏曰棟屋脊標也宇椽也棟直承而上故曰上棟宇兩垂而下故曰下宇棟取四剛義宇取二柔義古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺椁蓋取諸大過送死大事而過於厚上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬明決之義器此第二章言聖人制尚象之事附録上古結繩而治後世易之以書契天下事有古未之為而後人為之固不可無者此類是也如年號一事古所未有後世既置便不可廢胡文定却以後世建年號為非以為年號之美有時而窮不若只作元年二年三年也此殊不然三代以前事迹多有不可考者正緣無年號所以事無統紀難記如云某年王某月箇箇相似更無理㑹處及漢既建年號於是事乃各有所紀屬而可記而今有年號猶自姦僞百出若只寫一年兩年三年則官司詞訴簿歷慿何而決少間更無討理㑹處嘗見前輩說有兩家爭田地甲家賣在元祐幾年乙家買在其先甲家遂將元字改擦作嘉字乙家别將出文字又在嘉祐之先甲家遂又將嘉祐字塗擦作皇祐有年號猶自被人如此無後如何僴結繩今溪洞諸蠻猶有此俗又有刻板者年月日時以至人馬糧草之數皆刻板為記都不相亂僴纂注蔡氏曰言有所不能記者則造書以記之事有所不能信者則造契以信之取明決之義是故易者象也象也者像也易卦之形理之似也附録易也者象也象也者像也只是髣佛說不可求得太深佐易者象也是總說起言易不過只言隂陽之象下云像也材也天下之動也則皆是說那上面象字學蒙彖者材也彖言一卦之材爻也者效天下之動者也效放也是故吉凶生而悔吝著也悔吝本微因此而著此第三章陽卦多隂隂卦多陽震坎艮為陽卦皆一陽二隂巽離兊為隂卦皆一隂二陽其故何也陽卦竒隂卦耦凡陽卦皆五畫凡隂卦皆四畫附録問陽卦多隂至隂卦偶曰陽卦五畫所以多隂隂卦四畫所以多陽因為之說曰陽卦宜多陽而多隂隂卦宜多隂而多陽其故何也蓋陽卦之數必五竒數也竒則隂畫自多隂卦之數必四偶數也偶則陽畫自多其多隂多陽皆自然而然非人力所能參也先生曰是學蒙愚因語録而推八卦竒偶之畫每卦雖各得其三而合之則為六乾坤合為六震巽合亦六坎離合亦六艮兊合亦六適符老隂掛扐之用數總之則四六二十四畫而成老隂過揲之數若無與於老陽之數矣然以陽卦五畫隂卦四畫觀之竒偶之合又皆老陽掛扐之用數故乾坤合為九震巽合亦九坎離合亦九艮兊合亦九悉數之實成三十六而為老陽過揲之數焉此乾坤用九用六其數默見於卦畫之可推者如此雖出於偶然其實亦莫非自然之妙也豈可以人力參哉其德行何也陽一君而二民君子之道也隂二君而一民小人之道也君謂陽民謂隂四此第章附録二君一民試教一箇民而有兩箇君看是甚摹樣淵纂注徐氏曰君謂陽民謂隂君子之道以陽統隂小人之道以隂統陽易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮引咸九四爻辭而釋之言理本無二而殊塗百慮莫非自然何以思慮為哉必思而從則所從者亦狹矣附録感應之理本不消思慮空費思量空費計較空費安排只順其自然而已僴纂注蔡氏曰天下萬殊何思何慮而能感之以其迹而言則歸雖同而塗則殊以其心而言則志雖一而慮則百殊塗百慮紛然並作果何從而思何從而慮也日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而嵗成焉往者屈也來者信也屈信相感而利生焉言往來屈信皆感應自然之常理加憧憧焉則入於私矣所以必思而後有從也附録日往則月來一段乃承上章憧憧往來而言往來皆人所不能無者但憧憧則不可學蒙往來自不妨如日往月來寒往暑來皆是常理只著箇憧憧便閙了德明纂注程子曰感動也有感必有應凡有動皆為感感則必有應所應復為感感復為應所以不已也按朱子釋之曰如日往則感得那月來月往則感得那日來寒往則感得那暑來暑往則感得那寒來一感一應一往一來其理無窮感應之理是如此曰此以感應之理言之非有情者云有動皆為感似以有情者言曰父慈則感得那子愈孝子孝則感得那父愈慈其理亦只一般又曰凡在天地之間無非感應之理造化與人事皆是感應且如雨𤾉雨不成只管雨便感得個𤾉出來𤾉不成只管𤾉𤾉已是應處又感得雨來是所謂感復有應所應復為感寒暑晝夜無非此理至如人睡夜不成只管睡不起至曉須著起來一日運動向晦亦須當息凡一死一生一出一入一往一來一語一默皆是感應如古今天下有一盛則有一衰聖人在上兢兢業業必曰保治及到衰廢自是整頓不起然不成一向如此必有興起時節尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也因言屈信往來之理而又推以言學亦有自然之機也精研其義至於入神屈之至也然乃所以為出而致用之本利其施用無適不安伸之極也然乃所以為入而崇德之資內外交相養互相發也附録尺蠖若不屈則伸不得龍蛇若不蟄便不伏得氣如何存得身精義入神疑其與行處不相關然而見得道理通徹乃所以致用利用安身與崇德不相關然而動作得其理則德自崇天下萬事萬變無有不感通往來之理學蒙尺蠖屈便要求伸龍蛇蟄便要存身精研義理無毫釐絲忽之差入那神妙處這便是要出來致用外而用得利而安身乃所以入來自崇已德致用之用即是利用之用所以橫渠云精義入神事豫吾內求利吾外利用安身素利吾外致養吾內淵精義入神正與利用安身為對其曰精此義而入於神猶曰利其用以安身耳答江元通精義二字聞諸長者所謂義者宜而已矣物之有宜有不宜事之有可有不可吾心處之知其各有定分而不可易所謂義也精義者精諸此而已所謂精云者猶曰察之云耳精之之至而入於神則於事物所宜毫釐委曲之間無所不悉有不可容言之妙矣此所以致用而用無不利也同上義至於精則應事接物之間無一非義不問小事大事千變萬化改頭換面出來自家應副他如利刀快劍相似迎刃而解件件判作兩邊去賀孫精義入神以致用也蓋唯如此然後可以應務未至於此則凡所作為皆出於私意之鑿冥行而已雖使或中君子不貴也答程洵大雅問利者義之和也順利此道以安此身則德亦從而進矣曰孔子遭許多困厄身亦危矣而德亦進何也大雅云身安而後德進者君子之常孔子遭變權之以宜寧身不安德則須進曰然大雅過此以往未之或知也窮神知化德之盛也下學之事盡力於精義利用而交養互發之機自不能已自是以上則亦無所用其力矣至於窮神知化乃德盛仁熟而自致耳然不知者往而屈也自致者來而信也是亦感應自然之理而已張子曰氣有隂陽推行有漸為化合一不測為神此上四節皆以釋咸九四爻義附録夫子之教顔子只是博文約禮二事至於欲罷不能既竭吾才如有所立卓爾處只缺箇熟所謂過此以往未之或知也窮神知化德之盛也人傑過此以往未之或知亦只是雖欲從之末由也已之意德明窮神知化德之盛這德字只是上面崇德之德德盛後便能窮神知化便如聰明睿知皆由此出自誠而明相似淵林問正蒙形而上者得辭斯得象矣神為不測故緩辭不足以盡神化為難知故急辭不足以盡化如何是緩辭急辭曰神自是急辭化是漸漸而化若急辭形容之不可㝢化是逐些子挨將去底一日復一日一月復一月節節挨將去便成一年這是化神是一箇物事或在彼或在此當其在隂時全體在隂在陽時全體在陽都只是這一物兩處都在不可測故謂之神橫渠云一故神兩故化又注云兩在故不測這說得甚分曉淵總論一章之㫖天下何思何慮便是先打破那思字却說那同歸殊途一致百慮又再說天下何思何慮謂何用如此憧憧往來而為此朋從之思也日月寒暑之往來尺蠖龍蛇之屈伸皆是自然底道理不往則不來不屈則不能伸也今之為學亦只是如此精義入神用力於內乃所以致用乎外利用安身求利於外乃所以崇德於內只是如此做將去雖至於窮神知化地位亦只是德盛仁熟之所至何思何慮之有謨易曰困于石據于蒺藜入于其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見邪釋困六三爻義附録非所困而困焉名必辱大意指困于石說石是挨動不得底物事自是不須去動他若只管去用力徒是困耳又曰且以人事言之有著力不得處若只管著力去做少問去做不成他人便道自家無能便是辱了名或曰若在其位則做得曰自是如此爻意義謂不可做底事便不可入頭去做學蒙易曰公用射隼于髙墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而動者也括結礙也此釋解上六爻義附録張欽夫說易謂只依孔子繫辭說便了如說公用射隼至成器而動者也只如此說便了固是如此聖人之意只恁地說不得緣在當時只理㑹得象數故聖人明之以理賀孫又曰孔子自是發出言外意學蒙子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾無咎此之謂也此釋噬嗑初九爻義纂注厚齊馮氏曰不以不仁為恥故見利而後勸於為仁不以不義為畏故畏威而後懲於不義善不積不足以成名惡不積不足以滅身小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶此釋噬嗑上九爻義子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于包桑此釋否九五爻義附録問危者以其位為可安而不知戒故危亡者以其存為可保故亡亂者有其治是自有其治如有其善之有故亂曰保字說得較牽强只是常有危亡與亂之慮可以安其位保其存有其治學蒙子曰德薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也此釋鼎九四爻義子曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望此釋豫六二爻義漢書吉之之間有凶字附録魏問幾者動之微吉之先見者也曰似是漏字漢書上引此句說幾者動之微吉凶之先見者也似說得是幾自是有善有惡君子見幾亦是方舍惡從善賀孫幾是動之微是欲動未動之間便有善惡便須就這處理㑹若至於發著之甚則亦不濟事矣更怎生理㑹所以聖賢說戒謹乎其所不睹恐恐懼乎其所不聞蓋幾微之際大是要切道夫君子上交不諂下交不瀆他這下面說幾最要看箇幾字只爭些子凡事未至而空說道理易見事已至而顯然道理也易見惟事之方萌而動之微處此最難見或問幾者動之微何以獨於上交下交言之曰上交要恭遜便不知不覺有箇諂底意思在裏頭下交不瀆亦是如此所謂幾者只才覺得近諂近瀆勿令如此此便是知幾僴上交著些取奉之心下交便有傲慢又曰這事難如邦有道危言危行邦無道危行言遜今有一樣人其不畏者又言過於直其畏謹者又縮做一團更不敢說一句話此便是曉不得那幾若知幾則自中節無此病矣僴知微知彰知柔知剛是四件事既知微又知彰既知柔又知剛所以為民之望也學蒙纂注程子曰夫子因二之見幾而極言知幾之道夫見事之幾微者其神妙矣乎君子上交不至於諂下交不至於瀆者蓋知幾也不知幾則至於過而不已交於上以恭巽故過則為諂交於下以和易故過則為瀆君子見於幾微故不至於過也所謂幾者始動之微也吉凶之端可見而未著者也獨言吉者見之於先豈復至有凶也子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復無祗悔元吉殆危也庶幾近意言近道也此釋復初九爻義附録殆是幾乎之義又曰是近義又曰殆危是爭些子底意思學蒙直是顔子天資好如至清之水纎芥必見蓋卿天地絪緼萬物化醇男女搆精萬物化生易曰三人行則損一人一人行則得其友言致一也絪緼交密之狀醇謂厚而凝也言氣化者也化生形化者也此釋損六三爻義附録致一是専一之義程先生言之詳矣天地男女都是兩箇方得専一若三箇更亂了程先生說初與二三與上四與五皆兩箇相與自說得好初二二陽四五二隂同德相比三與上應皆兩兩相與學蒙子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也無交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恆凶此釋益上九爻義此第五章附録夫子云不學詩無以言先儒以為心平氣和則能言易曰易其心而後語也答劉玶子曰乾坤其易之門邪乾陽物也坤隂物也隂陽合德而剛柔有體以體天地之撰以通神明之德諸卦剛柔之體皆以乾坤合德而成故曰乾坤易之門撰猶事也附録乾坤易之門不是乾坤别有易只易便是乾坤乾坤便是那兩扇門相似一扇開便一扇閉只是一箇隂陽做底如闔户謂之坤闢户謂之乾淵撰是所為又曰只是說他做處淵纂注徐氏曰陽畫為乾隂畫為坤門猶闔户闢户之義一闔一闢為易之門其變無窮皆二物也隂陽合德謂二物交錯而相得有合剛柔有體謂成卦爻之體也天地之撰隂陽造化之迹也有形可擬故曰體體天地之撰言聖人作易皆以體法造化之事而效其至著者也神明之德隂陽健順之性也有理可推故曰通通神明之德言易書既作又以通知造化之理而極於至微者也蔡氏曰乾坤合而後成衆卦爻之體如剛來而下柔剛上而柔下此類皆由乾坤相合而成所謂隂陽合德而剛柔有體也其稱名也雜而不越於稽其類其衰世之意邪萬物雖多無不出於隂陽之變故卦爻之義雖雜出而不差謬然非上古淳質之時思慮所及也故以為衰世之意蓋指文王與紂之時也附録問其稱名也雜而不越是指繫辭而言是指卦名而言曰他後兩三畨說名後又舉起九卦說看來只是為卦名學蒙於稽其類是說稽考其事類淵其衰世之意邪伏羲畫卦這般事都已有了只是未曽經歷到文王時世變不好古來未曽有底事都有了他一一經歷這﨑嶇萬變過來所以說出那卦辭如箕子之明夷如入于左腹獲明夷之心于出門庭此若不是經歷如何說得淵纂注徐氏曰上古之世俗朴民淳迷於吉凶之途而莫知所趨故伏羲畫卦以教之占而吉凶以明斯民由之而無疑也雖乾陽坤隂剛柔交錯顯而體天地之撰微而通神明之德然剛勝則吉柔勝則凶亦未嘗費辭也中古以來人心變詐迷謬愈甚文王周公於是繫卦爻之辭稱名辨物稽類考占以開示隂陽之義易之道雖無餘藴而聖人憂患後世之意蓋亦有不得已焉者故下文又申言之夫易彰往而察來而微顯闡幽開而當名辨物正言斷辭則備矣而微顯恐當作微顯而開而之而亦疑有誤附録問彰往察來如神以知來知以藏往相似往是已定底如天地隂陽之變皆已見在這卦上了曰是學蒙往者如隂消陽長來者事之未來吉凶淵微顯闡幽幽者不可見便就這顯處說出來顯者便就上面尋出這不可見底教人知學蒙微顯闡幽便是顯道神德行德行顯然可見者道不可見者微顯闡幽是將道來事上看言那箇雖是粗底然皆出於道義之藴微顯所以闡幽闡幽所以微顯只是一箇物事淵其稱名也小其取類也大其㫖逺其辭文其言曲而中其事肆而隱因二以濟民行以明失得之報肆陳也二疑也盡此第六章多闕文疑字不可通後皆倣此纂注徐氏曰往謂隂陽消長剛柔變化卦爻所藏者易皆著而明之故曰彰往來謂吉凶未定事之方來者占筮中所告可以前知故曰察來顯者微之使求其原故曰微顯幽者闡之使見其端故曰闡幽當名謂父子君臣之分貴賤上下之等各當其位也辨物謂乾馬坤牛離火坎水碩果莧陸之類悉辨其似也正言謂元亨利貞直方大之辭正其言以曉人也斷辭謂利涉大川不利涉大川可小事不可夫事之語有以決其疑也負乘往來事名之小者也茅棘豕雉物名之小者也所稱雖小而其所取之類皆本於隂陽非稱名也小取類也大乎㫖謂所示之理文謂經緯錯綜也極天下之賾凡天地隂陽道德性命之奧象皆示之而其所繫之辭經緯錯綜皆有自然之文非其㫖逺其辭文乎曲委曲也凡委曲其文者未必皆中乎理易則言雖曲而無不中也肆陳也凡敷陳其事者無有隱而不彰易則事雖肆而其理未嘗不隱也二疑也報猶應也失得之報吉凶之應也因民之疑二而決其疑以濟其所行有以明著其吉凶之應也愚謂此一節上六句皆是抑揚說易書所載名雖小而類則大㫖雖逺而辭則文言雖曲而理則中事雖肆而理則隱正與書直而溫寬而栗等語同意易之興也其於中古乎作易者其有憂患乎夏商之末易道中微文王拘於羑里而繫彖辭易道復興附録鄭仲履問作易者其有憂患乎如何只取九卦先生云聖人論處憂患偶然說此九卦意思自足若更添一卦也不妨更不說一卦也不妨只就此九卦中亦自儘有道理且易中儘有處憂患底卦非謂九卦之外皆非所以處憂患也若以困為處憂患底卦則屯蹇非處憂患而何觀聖人之經正不當如此後世拘於象數之學乃以為九陽數聖人之舉九卦蓋合此數也尤泥而不通矣顯子是故履德之基也謙德之柄也復德之本也恆德之固也損德之修也益德之裕也困德之辨也井德之地也巽德之制也履禮也上天下澤定分不易必謹乎此然後其德有以為基而立也謙者自卑而尊人又為禮者之所當執持而不可失者也九卦皆反身修德以處憂患之事也而有序焉基所以立柄所以持復者心不外而善端存恆者守不變而常且久懲忿窒欲以修身遷善改過以長善困以自驗其力井以不變其所然後能巽順於理以制事變也附録履德之基只是要以踐履為本謙德之柄只是要謙退若處患難而矯亢自髙取禍必矣復德之本如孟子所謂自反困德之辨其處困而通則可以辨其是困而不通則可以辨其非損是懲忿窒欲益是修德益令廣大巽德之制巽以行權巽只是低心下意要制事須是將心入那事裏去順他道理方能制事方能行權若心粗只從事皮上綽過如此權便錯了學蒙井居其所而遷又云井德之地也蓋井有定體不動然水流出去而不窮猶人心有守不動而應變於外則不窮也德之地地是那不動地頭學蒙巽為資斧所以多作斷制之義蓋巽之義非順字所能盡順而能入之謂巽一隂入在二陽之下是入細直徹到底不只到皮子上者如此方斷得殺若不見得盡如何可以行權必大纂注徐氏曰履踐也基猶基址禮卑如地人之踐履一循乎禮是從實地上立步步步皆實則德有其基自下積纍而上故曰德之基復為反善之義人非聖人不能不流於惡能於念慮之萌人所不知已所獨知之處審其幾而復於善焉是德有其本也人處困窮出處語默之間取豫辭受之際最可觀德當義則為君子違理則為小人明辨於斯所以自驗其所守也履和而至謙尊而光復小而辨於物恆雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而隱此如書之九德禮非强世然事皆至極謙以自卑而尊且光復陽微而不亂於羣隂恆處雜而常德不厭損欲先難習熟則易益但充長而不造作困身困而道亨井不動而及物巽稱物之宜而潛隱不露附録履之為卦君臣上下各履其位而得其和者也和則疑於平易而非極至之義然各得其所而不亂是乃所以為至也又曰履和而至以下皆是反說謙尊而光若秦人尊君卑臣則雖尊而不光故謙則尊而又光復是一陽生於羣隂之下如幽暗中一㸃白便是白而辨也復雖一陽生然而與衆隂却不相亂人之善端方萌雖小然而衆惡却遏他不得學蒙損先難而後易不探虎穴不得虎子須是捨身入裏面去如搏寇讐方得之若輕可地說得不濟事顯子如子産為政鄭人歌之曰孰殺子産吾其與之及三年人復歌而頌之蓋事之初在我亦有所勉强在人亦有所難堪久之當事理順人心這裏方易便如利者義之和一般義是一箇制斷物事恰似不和久之事得其宜乃所以為利如萬物到秋許多嚴凝肅殺之氣似可畏然萬物到這裏若不得此氣收斂凝結許多生意天無所成就其難者乃所以為易也僴益長裕而不設長裕只是一事但充長自家物事教寬裕而已困窮而通此因困卦說澤無水困君子以致命遂志蓋此是致命遂志之時所以困彖曰險以說困而不失其所亨其惟君子乎蓋取困而能說也井居其所而遷井是掇不動之物然其水却流行出去利物僴井有本故澤及於物而井未嘗動故曰居其所而遷如人有德而後能施以及人然其德性未嘗動也銖既說井以辨義又說井居其所而遷井是不可動物事水却可隨所汲而往如道之正體却一定於此而隨事制宜自莫不當所以說井以辨義又云井居其所而遷賀孫巽稱而隱巽是箇卑巽底物事如兊見而巽伏也自是箇隱伏底物事蓋巽一隂在下二陽在上隂初生時已自稱量得個道理了不待顯而後見如事到面前自家便有一箇道理處置他不待發露出來又曰稱而隱是巽順恰好底道理有隱而不能稱量者有能稱量而不能隱伏至露形迹者皆非巽之道也巽德之制也巽以行權都是此意僴陳才卿問隱字何訓曰隱不見如風之動物無物不入但見其動而不見其形權之為用亦猶是也僴纂注徐氏曰設施為也自然充長不待施為以求其益也益之道當俟其涵養從容自然有得不可萌欲速助長之心設謂有所安排布置要如何也蔡氏曰和則不能必至而履之和則能至尊者不能必光而謙之尊則能光微昧者不辨於物而復之小則能辨雜者人厭之而恆之雜則不厭難者不易而損之先難則有後易之理設施為也裕則多施為而益之裕則不施窮則不通而困之窮則能通遷謂養物不窮也居其所則不遷而井之居則能遷稱輕重等也稱則形著而巽之稱則能隱此如書之九德蓋兼體用而言也履以和行謙以制禮復以自知恆以一德損以逺害益以興利困以寡怨井以辨義巽以行權寡怨謂少所怨尤辨義謂安而能慮道此第七章三陳九卦以明處憂患之附録禮主卑下履也是那踐履處所行若不由履自是乖戾所以曰履以和行謙又更卑下所以節制乎禮又曰禮是自家恁地卑下謙是應物而言學蒙困以寡怨是得其處困之道故無所怨於天無所尤於人若不得其道則有所怨尤矣僴井以辨義謂安而能慮蓋守得自家心先定方能辨事之是非若自家心先不定事到面前安能辨其義邪僴問井以辨義是大小多寡所施各當如上文居其所而遷是否曰然必大又曰兊見而巽伏權是隱然做底物事若顯然地做却不成行權淵巽只柔順低心下意底意義人至行權處不少巽順如何行得蓋卿才卿問巽以行權曰見得道理精熟後於物之精微委曲處無處不入所以說巽以行權又曰這說在九卦之後是這八卦事了方可以行權銖三陳九卦初無他意觀上面其有憂患一句便見得聖人說處憂患之道聖人去這裏偶然見得有此理便就這裏說出聖人如雲行水流初無定相不可確定愚謂三陳九卦自有次第第一節論九卦之德第二節論九卦之材第三節方論聖人用九卦以處憂患之道故皆以以之一字言之亦如六十四卦大象必著一以字以明其用易也易之為書也不可逺為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要唯變所適逺猶忘也周流六虛謂隂陽流行於卦之六位附録謂易之所言無非天地自然之理人生日用之所不能須臾離者故曰不可逺曰是學蒙易不是確定硬本子有陽居陽爻而吉底又有凶底有有應而吉底有有應而凶底是不可為典要之書這個是有許多變所以如此淵大𫝊說上下無常唯變所適便見得易人人可用不是死法雖道是二五是中却其間有位二五而不吉者有當位而吉亦有當位而不吉者若揚雄太𤣥皆排定了第幾爻吉第幾爻凶此便是死法賀孫纂注蔡氏曰易之為書以下總言為書為道以起下文兩節之意變動不居至唯變所適言易道之屢遷也卦雖六位而剛柔爻畫往來如寄非實有也故以虛言揲蓍求卦易之變動初無定體而周流乎六虛之位或自上而降或由下而升上下無常也柔來文剛分剛上而文柔剛柔相易也其出入以度外內使知懼此句未詳疑有脫誤附録問據文勢則外內使知懼合作使內外知懼曰是如此學蒙使知懼便是使人有戒懼之意易中說如此則吉如此則凶是也既知懼則雖無師保一似臨父母相似又明於憂患與故無有師保如臨父母雖無師保而常若父母臨之戒懼之至纂注蔡氏曰其出入以度至如臨父母此言易書之不可逺也出謂卦爻自內往交於外入謂卦爻自外來居於內度節度也故謂憂患所以然也言易之為書其出其入皆有度不差或內或外皆使人知所恐懼而修省也憂患之來既知所處矣又推其所以然而安於所遇也雖無師保之嚴如臨父母之側易之書其可親也如此信乎其不可逺也初率其辭而揆其方既有典常茍非其人道不虛行方道也始由辭以度其理則見其有典常矣然神而明之則存乎其人也此第八章附録既有典常是一定了占得他這淵爻了吉凶自定這便是有典常纂注蔡氏曰此合書與道為言也易之為書也原始要終以為質也六爻相雜唯其時物也質謂卦體卦必舉其始終而後成體爻則唯其時物而已纂注徐氏曰此聰言聖人作易所以立卦生爻之義下文又逐爻分說而申明之也質謂卦體時謂六位之時物謂隂陽二物也原其事之始要其事之終以為一卦之體質卦有六爻剛柔錯雜隨其時辨其物言卦雖有全體而爻亦無定用也其初難知其上易知本末也初辭擬之卒成之終此言初上二爻纂注蔡氏曰初爻者卦之本本則其質未明故難知上爻者卦之末末則其質已著故易知難知則所繫之辭必擬議而後得易知但卒其卦之辭而成其卦之終也若夫雜物撰德辨是與非則非其中爻不備此謂卦中四爻附録先儒解此多以為互體如屯卦震下坎上就中間四爻觀之自二至四則為坤自三至五則為艮故曰非其中爻不備互體說漢儒多用之左𫝊中一處占得觀卦處亦舉得分明看來此說不可廢學蒙愚謂物謂內外卦隂陽二物雜謂自其中四爻雜而互之又自成兩卦之德也故謂之撰是非者當位不當位中不中正不正也內外卦既足以示人矣復自互體而辨之則是是非非於是乎益可見焉噫亦要存亡吉凶則居可知矣知者觀其彖辭則思過半矣彖統論一卦六爻之體二與四同功而異位其善不同二多譽四多懼近也柔之為道不利逺者其要無咎其用柔中也此以下論中爻同功謂皆隂位異位謂逺近不同四近君故多懼柔不利逺而二多譽者以其柔中也附録問其要無咎其用柔中也近君則當柔和逺去則當有强毅剛正之象始得此二之所以不利然而居中所以無咎曰也是恁地說又曰其要無咎若作去聲則是要約之義若作平聲則是要其歸之之意又曰其要只欲無咎三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝邪三五同陽位而貴賤不同然以柔居之則危唯剛則能勝之此第九章易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也三畫已具三才重之故六而以上二爻為天中二爻為人下二爻為地道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉道有變動謂卦之一體等謂逺近貴賤之差相雜謂剛柔之位相間不當謂爻不當位十此第章纂注徐氏曰卦之全體三才之道也道則變動不居如潛見躍飛之類皆道之變動而謂之爻爻也者效天下之動也或剛或柔而小大有等故謂之物物即隂陽二物也一不獨立二則為文隂陽兩物交相錯雜故謂之文陽居陽位隂居隂位當也陽居隂位隂居陽位不當也吉凶由是而生則可以觀變玩占而見其文之著矣易之興也其當殷之末世周之盛德邪當文王與紂之事邪是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要無咎此之謂易之道也危懼故得平安慢易則必傾覆易之道也此第十一章附録其辭危是有危懼之意故危懼者使之平安慢易使之傾覆易之書於萬物之理無所不具故曰百物不廢其要無咎學蒙纂注徐氏曰知易之道而有所恐懼可使安平也不由其道而有所慢易必至傾覆也故曰危者使平易者使傾然非有使之也天之生物必因材而篤焉故栽者培之傾者覆之亦自然之理也夫乾天下之至健也德行恆易以知險夫坤天下之至順也德行恆簡以知阻至健則所行無難故易至順則所行不煩故簡然其於事皆有以知其難而不敢易以處之也是以其有憂患則健者如自髙臨下而知其險順者如自下趨上而知其阻蓋雖易而知險則不陷於險矣既簡而又知阻則不困於阻矣所以能危能懼而無易者之傾也附録問乾至健也至恆簡以知阻見得乾是至健不息之物經歷艱險處多雖有險處皆不足為他之病足以進之而無難底意思否曰不然舊亦嘗如此說覺得終是硬說易本意正要人知險而不進不說是我至健了凡有險阻只恁冒進而無難如此大非聖人作易之意觀其上文云易之興也其於中古乎至其要無咎此之謂易之道也看他此語是什麼恐懼危險不敢輕進之意乾之道便是如此卦中皆然所以多說見險而能止如需卦之類可見易之道正是要人知進退存亡之道若是冒險前進必陷於險知進而不知退知存而不知亡豈乾之道也惟其至健而知險故止於險而不陷於險也又曰此是就人事上說又曰易之為書大槩要人謹密戒懼以免患難若恃其至健而不恤險難豈易之道邪僴順自是畏謹宜其不越夫險如健却宜其不畏險然却知險而不去蓋他當憂患之際故也又曰若長是易時更有甚麼險他便不知險矣若長是簡時更有甚麼阻他便不知阻矣只是當憂患之際方見得同上乾天下之至健更著思量看來聖人無冒險之事須是知險便不進向前去他只是不直撞向前自别有一箇路去如舜知子之不肖則以天下授禹賀孫乾健而以易臨下故知下之險險底意思在下坤順而以簡承上故知上之阻阻是自家低他却髙底意思自上面下來到那去不得處便是險自下而上上到那去不得處便是阻淵頃因登山就山上得其說自上而下所見為險故以乾言自下而上所向為阻故以坤言能說諸心能研諸侯之慮定天下之吉凶成天下之亹亹者侯之二字衍說諸心者心與理㑹乾之事也研諸慮者理因慮審坤之事也說諸心故有以定吉凶研諸慮故有以成亹亹附録說諸心有自然底意思故屬陽研諸慮有作為底意思故屬隂謨說諸心只是見過了便說這箇屬陽研諸慮是研窮到底似那安而能慮直是仔細了這箇屬隂淵定吉凶乾也成亹亹坤也事之未定者屬乎陽定吉凶所以為乾事之已為者屬隂成亹亹者所以為坤謨且以做事言之吉凶未定時人自意思懶散不肯做去吉凶定了他自勉勉做將去所以屬隂大率陽是輕清底物事之輕清底屬陽隂是重濁底物事之重濁底屬隂淵能說諸心能研諸慮方始能定天下之吉凶成天下之亹亹者凡事見得通透了自是歡說既說諸心是都理㑹得了於事上更審一畨便是研諸慮研是更去研磨他定天下之吉凶是割判得這事成天下之亹亹是做得事業學蒙是故變化云為吉事有祥象事知器占事知來變化云為故象事可以知器吉事有祥故占事可以知來附録變化者隂陽之所為云為者人事之所作上兩句只說理如此下兩句是人就理上知得在隂陽則為變化在人事則為云為吉事自有祥兆惟其理如此故於變化云為則象之而知已有之器於吉事有祥則占之而知未然之事也問器字則是凡於有形之實事者皆為器否先生云易中器字是恁地說又曰變化云為是明吉事有祥是幽象事知器是人事占事知來是筮象事知器是人做這事占事知來是他方有禎祥見乎蓍龜之類吉事有凶事亦有淵問易書中有許多變化云為又吉事皆有休祥之應所以象事者於此而知器占事者於此而知來曰是天地設位聖人成能人謀鬼謀百姓與能天地設位而聖人作易以成其功於是人謀鬼謀雖百姓之愚皆得以與其能附録天地設位四句說天人合處天地設位使聖人成其功能人謀鬼謀則雖百姓亦可以與其能成能與能雖大小不同然亦是小小底造化之功用然百姓與能却須因蓍龜而方知得淵人謀鬼謀與洪範之謀及乃心謀及卜筮謀及卿士謀及庶人相似八卦以象告爻彖以情言剛柔雜居而吉凶可見矣象謂卦畫爻彖謂卦爻辭變動以利言吉凶以情遷是故愛惡相攻而吉凶生逺近相取而悔吝生情僞相感而利害生凡易之情近而不相得則凶或害之悔且吝不相得謂相惡也凶害悔吝皆由此生附録問易之情近而不相得則凶或害之悔且吝如何先生云此疑是指占法而言想古人占法今不見得蓋逺而不相得則安能為害惟切近不相得則凶害便能相及也一箇凶人在五湖四海之內安能害自家若與之為鄰近則有害矣又問云此如今人占火珠林課底若是凶神動與世不相關不能為害惟是克世則方能為害否先生云恐是這一樣意思纂注徐氏曰易道變動開物成務以利言也而卦爻之辭有吉有凶以其情之有所遷耳愛惡相攻如訟九四不克訟復即命以與四相愛也謙六五利用侵伐上六利用行師以與九三相愛也同人九三伏戎于莽惡九五也九五大師克相遇惡三四也逺近相取如姤九五以杞包瓜上九姤其角逺取初六也解六三負且乘近取二四也豫六三旴豫近取九四也情僞相感如中孚九二鳴鶴在隂以情感乎五也屯六四求㛰媾往以情感乎初也蒙六三見金夫不有躬以僞感乎二也漸九三夫征不復婦孕不育以僞感乎四也凡此皆以情遷者也愚謂變動即上文爻有變動動是己以利言者爻之變本皆教人趨吉避凶而歸於利耳然不免吉凶殊分者由情而遷也情有善有不善善則遷於吉不善則遷於凶至是不能皆歸於利矣是故以下愛惡逺近情僞所謂情也相攻相取相感遷之由也吉凶悔吝利害總名之曰吉凶也愛惡相攻因於逺近相取逺近相取因於情僞相感相感者情之始交利害之開端也相取者迹之已著悔吝之途分也相攻則事之已極吉凶之不可移也此三言皆吉凶以情遷之事凡易之情以下獨舉近者總言之近而相取其情乃不相得此必其初之以僞感終至於惡而相攻是以凶耳既至於凶其於害悔吝可知矣即此一條備三者而明之大要欲人警省悔心生而吉利隨之終歸夫變動之利不墯於情遷之凶耳易之道固如此也將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭游失其守者其辭屈卦爻之辭亦由是也附録問八卦以象告至失其守其辭屈竊疑自吉凶可見矣而上只是總說易書所載如此自變動以利言而下就人占時上說如何先生曰然銖纂注徐氏曰叛背叛也背叛正理其中有慊則發於辭自然慙怍也枝如木之有枝開兩岐疑者可否未決則其辭不直截成兩岐也誣善者謂謗善為惡言語不實如物在水上浮游不定失其守者言見理不定無所操執其辭多屈而不伸也言心之聲由乎中而見乎外孟子詖淫邪遁一章意亦如此厚齊馮氏曰六辭與易全不相關恐斷簡錯見於此或曰諸如此類易各準其情而為辭然誣善失守恐不入卦爻王介甫曰易之辭必不慙枝游屈也王介甫郭子和蓋嘗疑之不敢彊通愚謂六辭與易誠不相關意者指尚占命筮之辭上發曰君子將有為也將有行也問焉而以言其受命也如響夫子於此又發其情以見命筮之際本諸中形諸外自有不可掩者神物之蓍顧不能前知吉凶以告之乎亦欲人謹其事而重其筮也易附録纂注卷八
