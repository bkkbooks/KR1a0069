body:
  text: 易附録纂注卷六元胡一桂撰山上有澤咸君子以虛受人山上有澤以虛而通也附録上兊下艮兊上闕有澤口之象兊下二陽畫有澤底之象艮上一畫陽有土之象下二隂畫中虛便是滲水之象砥纂注程子曰澤性潤下土性受潤澤在山上而漸潤通徹是二物之氣相感通也君子觀山澤通氣之象而虛其中以受於人夫人中虛則能受實則不能入矣虛中者無我也中無私主則無感不通以量而容之擇交而受之此聖人有感必通之道也咸其拇志在外也纂注蔡氏曰外謂四也雖凶居吉順不害也纂注程子曰二居中正其才本善以其在咸之時質柔上應故戒以先動求君則凶居以自守則吉象復明之云非戒之不得相感唯順理則不害謂守道不先動也咸其股亦不處也志在隨人所執下也言亦者因前二爻皆欲動而云也二爻隂躁其動也宜九三陽剛居止之極宜靜而動可吝之甚也纂注徐氏曰世之君子位居人上所守不正感不以道而反徇夫褻御臣僕在下者之私情至於多行可愧者皆執其隨者也貞吉悔亡未感害也憧憧往來未光大也感害言不正而感則有害也咸其脢志末也志末謂不能感物咸其輔頰舌滕口說也滕騰通用纂注程子曰唯至誠為能感人乃以柔說騰楊於口舌言說豈能感於人乎雷風恆君子以立不易方纂注丘行可曰巽入也而在內震出也而在外二物各居其位則謂之恆故君子體之而立不易方若雷入而從風風出而從雷二物易位而相從則謂之益矣故君子體之亦有遷改之義此恆益之所以不同也浚恆之凶始求深也九二悔亡能久中也不恆其德無所容也纂注程子曰不常之人無所容處其身也久非其位安得禽也婦人貞吉從一而終也夫子制義從婦凶也纂注徐氏曰以順為正者妾婦之道婦人當一於從而守其終則吉若夫子則制義者也從婦之道則為凶矣振恆在上大無功也天下有山遁君子以逺小人不惡而嚴天體無窮山髙有限遁之象也嚴者君子自守之常而小人自不能近附録問遁字雖是逃隱大抵亦取逺去之意天上山下相去甚遼絶象云君子以逺小人則君子如天小人如山相絶之義須如此方得所以六爻在上而漸逺者愈善也曰恁地推得好學蒙纂注蔡氏曰逺小人艮象不惡而嚴乾象遁尾之厲不往何災也執用黃牛固志也係遁之厲有疾憊也畜臣妾吉不可大事也君子好遁小人否也嘉遁貞吉以正志也肥遁無不利無所疑也雷在天上大壯君子以非禮弗履自勝者强附録雷在天上是甚生威嚴人之克己能如雷在天上則威嚴果決以去其惡而必於為善若半上落下則不濟事何以為君子須是如雷在天上方能克去非禮輝纂注程子曰古人云自勝之謂强赴湯火蹈白刃武夫之勇可能也至於克己復禮則非君子之大壯不可能也故曰君子以非禮勿履蔡氏曰禮者正大之文以天而動取二象言壯于趾其孚窮也言必困窮纂注程子曰在最下而用壯以行可必信其窮困而凶也九二貞吉以中也小人用壯君子罔也小人以壯敗君子以罔困藩決不羸尚往也纂注蔡氏曰尚往者前無困沮可以上進也故曰尚往喪羊于易位不當也不能退不能遂不詳也艱則吉咎不長也纂注蔡氏曰詳審也不詳謂不審明出地上晉君子以自昭明德昭明之也晉如摧如獨行正也裕無咎未受命也初居下位未有官守之命纂注徐氏曰居無位之初以寬裕自處不汲汲於求進乃其宜也故無咎若已受命則是當事有官職茍一於裕則有曠廢之失能無咎乎受兹介福以中正也衆允之志上行也纂注程子曰上行下從大明之君衆志之所同也鼫鼠貞厲位不當也失得勿恤往有慶也維用伐邑道未光也明入地中明夷君子以蒞衆用晦而明附録晦地象明日象晦則是不察察若晦而不明則晦得沒理㑹了故外晦而內必明乃好學蒙纂注蔡氏曰涖明離象衆晦坤象君子于行義不食也唯義所在不食可也六二之吉順以則也南狩之志乃大得也入于左腹獲心意也箕子之貞明不可息也初登于天照四國也照四國以位言後入于地失則也風自火出家人君子以言有物而行有恆身修則家治矣附録火中有風如一爐火光此氣自薰蒸上出是也此只是言自內及外之意輝纂注程子曰正家之本在正其身君子觀風自火出之象知事之由內而出故所言必有物所行必有恆也物謂事實恆謂常度法則也德業之著於外由言行之謹於內也言謹行修則身正而家治矣間有家志未變也志未變而預防之纂注程子曰間之於家人志意未變之前是以悔亡志變而後治則所傷多矣乃有悔也六二之吉順以巽也家人嗃嗃未失也婦子嘻嘻失家節也富家大吉順在位也王假有家交相愛也程子曰夫愛其內助婦愛其刑家威如之吉反身之謂也謂非作威也反身自治則人畏服之矣上火下澤睽君子以同而異二卦合體而性不同附録銖問君子以同而異曰此是取兩象合體為同而其性各異在人則是和而不同之意蓋其趨則同而所以為同則異如伯夷柳下惠伊尹三子所趨不同而其歸則一彖辭言睽則同大象言同而異在人則出處語默雖不同而同歸於理講論文字為說不同而同於求合義理立朝論事所見不同而同於忠君本義所謂二卦合體者言同也而性不同者言異也以同而異語意與用晦而明似又問睽卦無正應而同德相應者何也曰無正應所以為睽當睽之時當合者既離其離者却合也銖君子有同處有異處如所謂周而不比羣而不黨是也大抵易中六十四象下句皆是就人事之近處說不必深去求他此處伊川說得甚好學蒙纂注程子曰君子觀睽異之象於大同之中而知所當異也夫聖賢之處世在人理之常莫不大同於世俗所同者則有時而獨異蓋於秉彞則同矣於世俗之失則異也不能大同者亂常拂理之人也不能獨異者隨俗習非之人也要在同而能異耳見惡人以辟咎也遇主于巷未失道也本其正應非有邪也見輿曳位不當也無初有終遇剛也纂注程子曰有終者終必與上九遇合乃遇剛也不正而合未有久而不離者也合以正道自無終睽之理故賢者順理而安行知者知幾而固守交孚無咎志行也厥宗噬膚往有慶也遇雨之吉羣疑亡也山上有水蹇君子以反身修德纂注程子曰君子之遇艱阻必反求諸己而益自修孟子曰行有不得者皆反求諸己故遇艱蹇必自省於身有失而致之乎是反身也有所未善則改之無歉於心則加勉乃自修其德也君子修德以俟時而已愚謂反身即思不出位之義艮象修德即常德行之義坎象坎在艮下為蒙而稱君子以果行育德坎在艮上為蹇而稱君子以反身修德蓋反身如山不動而修德如水滋潤乎山之象也往蹇來譽宜待也王臣蹇蹇終無尤也事雖不濟亦無可尤往蹇來反內喜之也往蹇來連當位實也大蹇朋來以中節也往蹇來碩志在內也利見大人以從貴也雷雨作解君子以赦過宥罪纂注蔡氏曰赦宥解義過動震象罪陷坎象愚謂坎在上為雲在下為雨方雲雷而為屯則隂陽之未通今雷雨作解則隂陽之已通矣屯其為難之始解其散屯之難者歟剛柔之際義無咎也纂注蔡氏曰際謂交際柔居解初入坎尚淺而承剛應剛得剛柔交際之宜難必解者也故曰義無咎也九二貞吉得中道也負且乘亦可醜也自我致戎又誰咎也解而拇未當位也君子有解小人退也公用射隼以解悖也纂注蔡氏曰悖逆也解悖謂解三之悖逆而卒得其順也山下有澤損君子以懲忿窒欲君子修身所當損者莫切於此附録問懲忿窒欲忿怒易發難制故曰懲懲是戒於後欲之起則甚微漸漸到熾處故曰窒窒謂窒於初古人說情竇竇是罅隙須是窒其罅隙曰懲也不専是戒於後若是怒時也須去懲治他始得懲者懲於今而戒於後耳窒亦非是真有箇孔穴去塞了但遏絶之使不行耳又曰懲忿如救火窒欲如防水大雅問何以窒欲莫是欲心一萌當思禮義以勝之否曰然又曰觀山之象以懲忿觀澤之象以窒欲欲如汚澤然其中穢濁解汚染人須當填塞了廣問觀山之象以懲忿是如何曰人怒時自是恁地突兀起來故孫權曰令人氣湧如山纂注蔡氏曰山下之澤潤上行而水漸減損之象也懲止也窒塞也忿則陵物欲則溺己二者皆所當損懲忿艮象窒欲兊象己事遄往尚合志也尚上通九二利貞中以為志也一人行三則疑也損其疾亦可喜也六五元吉自上祐也弗損益之大得志也風雷益君子以見善則遷有過則改風雷之勢交相助益遷善改過益之大者而其相益亦猶是也附録遷善當如風之速改過當如雷之猛祖道曰莫是才遷善便是改過否曰不然遷善字輕改過字重遷善如慘淡之物要使之白改過如黑之物要使之白用力自是不同遷善者但是見人做得一事强似我心有所未安即便遷之若改過須是大段勇猛始得祖道風是一箇急底物見人之善已將不及遷之如風之急雷是一箇勇決底物已有過便斷然改之如雷之勇決不容其些子遲緩元吉無咎下不厚事也下本不當任厚事故不如是則不足以塞咎也附録利用遷國一爻象只曰下不厚事也自此推之則凡居下者不當厚事如子之於父臣之於君僚屬之於官長皆不可以踰分越職縱可為亦須是盡善方能無過所以有元吉無咎之戒也謨或益之自外來也或者衆無定主之辭益用凶事固有之也益用凶事欲其困心衡慮而固有之也告公從以益志也有孚惠心勿問之矣惠我德大得志也莫益之偏辭也或擊之自外來也莫益之者猶從其求益之偏辭而言也若究而言之則又有擊之者矣澤上於天夬君子以施祿及下居德則忌澤上於天潰決之勢也施祿及下潰決之意也居德則忌未詳愚謂施祿及下乃在上者之常事遽以德自居非所宜也故忌不勝而往咎也有戎勿恤得中道也纂注蔡氏曰先事則當惕及事不可憂得中道也君子夬夬終無咎也其行次且位不當也聞言不信聰不明也中行無咎中未光也程𫝊備矣附録中未光也事雖正而意潛有所係吝如所謂流注不斷皆意不誠之本也銖纂注程子曰夫人心正意誠乃能極中正之道而充實光輝五心有所比以義之不可而決之雖行於外不失中正之義可以無咎然於中道則未得為光大也蓋人心一有所欲則離道矣無號之凶終不可長也天下有風姤后以施命誥四方纂注蔡氏曰風行天下物無不遇姤之象也施乾象命巽象誥四方取風行天下之象繫于金柅柔道牽也牽進也以其進故止之包有魚義不及賔也其行次且行未牽也無魚之凶逺民也民之去已猶已逺之纂注徐氏曰民謂初柔逺民謂去初逺也九五含章中正也有隕自天志不舍命也愚謂命謂天命命即理也志不違於天理所以有自天之福姤其角上窮吝也澤上於地萃君子以除戎器戒不虞除者修而聚之之謂附録大凡物聚衆盛必有事故當豫為之備如人少處必無爭才人多少間便自有爭所以當豫為之防也又澤本地中今却上於地上是水盛有潰決奔突之憂故其取象如此僴愚謂除戎器澤容水象戒不虞地順象乃亂乃萃其志亂也引吉無咎終未變也往無咎上巽也纂注蔡氏曰從上二陽有巽體大吉無咎位不當也萃有位志未光也未光謂匪孚齎咨涕洟未安上也地中生木升君子以順德積小以髙大王肅本順作慎今按他書引此亦多作慎意尤明白蓋古字通用也說見上篇蒙卦附録曽考究得樹木之生日日滋長若一日不長便將枯瘁便是生理不接學者之於學不可一日少懈大抵得須日日要進若一日不進便退便昏近來學者才相疏便都休了其弊蓋以此必大纂注徐氏曰順德坤象積小髙大巽木象允升大吉上合志也九二之孚有喜也升虛邑無所疑也王用亨于岐山順事也以順而升登祭於山之象貞吉升階大得志也纂注蔡氏曰萃者澤聚於下故九五志未光升者木升於上故六五大得志冥升在上消不富也澤無水困君子以致命遂志水下漏則澤上枯故曰澤無水致命猶言授命言持以與人而不之有也能如是則雖困而亨矣附録君子道窮之時但當委致其命以遂吾之志而已致命猶送這命與他不復為吾之有雖委致其命而志則自遂無所回屈論語中致字都是委致之致事君能致其身與士見危致命見危授命皆是此意授亦致字之意言將這命授與之也僴困厄有重輕力量有小大若能一日十二辰檢㸃自已念慮動作都是合宜仰不愧俯不怍如此而不幸填溝壑喪身隕命有不暇恤只得成就一箇是處如此則方寸之間全是天理雖遇大困厄有致命遂志而已亦不知有人之是非向背惟其是而已大雅愚謂水在澤下則是澤漏而無水致命是兊澤涸象遂志是坎心亨象入于幽谷幽不明也困于酒食中有慶也據于蒺藜乘剛也入于其宫不見其妻不祥也來徐徐志在下也雖不當位有與也劓刖志未得也乃徐有說以中直也利用祭祀受福也困于葛藟未當也動悔有悔吉行也木上有水井君子以勞民勸相木上有水津潤上行井之象也勞民者以君養民勸相者使民相養皆取井養之義附録井象只取巽入之義不取木義淵僴問木上有水之義曰如草木之生津潤皆上行露水直至樹末此即木上有水之義雖至小之物亦然如石菖蒲每晨葉尾皆潮水珠雖藏之密室亦然非露水也又云上面露珠便是下面水上去大率裏面水氣上則外面底也上問井字之義與木上有水何與曰木上有水便如井中之水水本在井底却能汲上來供人食用故取象如此淵或謂木為汲器則後面却有瓶瓶自是瓦器此不可曉井泥不食下也舊井無禽時舍也言為時所棄井谷射鮒無與也井泄不食行惻也求王明受福也行惻者行道之人皆以為惻也井甃無咎修井也寒泉之食中正也元吉在上大成也澤中有火革君子以治厯明時四時之變革之大者附録水能滅火則只是說隂盛陽衰火盛則克水水盛則克火此是澤中有火之象便有那四時改革底意思君子觀這象便去治厯明時淵澤中有火革是言隂陽相勝復故君子治歷明時髙愚謂以兊繼離是以秋繼夏有暑往寒來之象故君子體之以治厯明時鞏用黃牛不可以有為也己日革之行有嘉也革言三就又何之矣言己審改命之吉信志也大人虎變其文炳也君子豹變其文蔚也小人革面順以從君也木上有火鼎君子以正位凝命鼎重器也故有正位凝命之意凝猶至道不凝之凝𫝊所謂協于上下以承天休者也附録正位凝命言人君臨朝也須端莊安重一似那鼎相似安在這裏不動然後可以凝住那天蔚之命所謂協于上下以承天休文纂注丘行可曰正位離象離有南面之位凝命巽象巽為命或謂革四言改命鼎言凝命蓋凝其己改之命也以鼎繼革欲人於變革之後以端重守之其㫖微矣鼎顛趾未悖也利出否以從貴也鼎而顛趾悖道也而因可出否以從貴則未為悖也從貴謂應四亦為取新之意鼎有實慎所之也我仇有疾終無尤也有實而不慎其所往則為仇所即而陷於惡矣纂注程子曰二不昵初而上從六三之正應乃是慎所之也初比已而非正是有疾也自守以正彼不能即我所以終無尤也鼎耳革失其義也纂注徐氏曰君臣以義合志也鼎耳革其行塞雉膏不食則於義乖矣故曰失其義也覆公餗信如何也言失信也鼎黃耳中以為實也玉鉉在上剛柔節也洊雷震君子以恐懼修省纂注程子曰君子畏天之威則修正其身思省其過咎而改之震來虩虩恐致福也笑言啞啞後有則也震來厲乘剛也震蘇蘇位不當也震遂泥未光也震往來厲危行也其事在中大無喪也震索索中未得也雖凶無咎畏鄰戒也中謂中心兼山艮君子以思不出其位艮其趾未失正也不拯其隨未退聽也三止乎上亦不肯退而聽乎二也艮其限危薰心也艮其身止諸躬也艮其輔以中正也正字羡文協韻可見敦艮之吉以厚終也山上有木漸君子以居賢德善俗二者皆當以漸而進疑賢字衍或善下有脫字附録山上有木木漸長則山漸髙所以為漸纂注蔡氏曰居德艮止象善俗巽入象居德以漸而進善俗以剛而入也小子之厲義無咎也飲食衎衎不素飽也素飽如詩言素餐得之以道則不為徒飽而處之安矣夫征不復離羣醜也婦孕不育失其道也利用禦寇順相保也或得其桷順以巽也終莫之勝吉得所願也其羽可用為儀吉不可亂也漸進愈髙而不為無用其志卓然豈可得而亂哉澤上有雷歸妹君子以永終知敝雷動澤隨歸妹之象君子觀其合之不正知其終之有敝也推之事物莫不皆然纂注程子曰永終謂生息嗣續永久其𫝊也知敝謂知物有敝壞而為相繼之道也又曰夫婦之道當常永有終必知其有敝之理而戒慎之敝壞謂離隙歸妹說以動者也歸妹以娣以恆也跛能履吉相承也恆謂有常久之德利幽人之貞未變常也歸妹以須未當也愆期之志有待而行也帝乙歸妹不如其娣之袂良也其位在中以貴行也以其有中德之貴而行故不尚飾上六無實承虛筐也雷電皆至豐君子以折獄致刑取其威照並行之象纂注程子曰雷電皆至明震並行也二體相合故云皆至明動相資成豐之象離明也照察之象震動也威斷之象折獄者必照其情實惟明克允致刑者以威其姦惡惟斷乃成故君子觀雷電明動之象以折獄致刑也蔡氏曰折獄離明象致刑震懼象震者陽破隂刑者君子所以懼小人雖旬無咎過旬災也戒占者不可求勝其配亦爻辭外意有孚發若信以發志也豐其沛不可大事也折其右肱終不可用也豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也六五之吉有慶也豐其屋天際翔也窺其户闃其無人自藏也藏謂障蔽附録天際翔也是其屋髙大至於天際却只是自障蔽又曰似是說如翬斯飛樣言其屋之大蔽障闊淵山上有火旅君子以明慎用刑而不留獄慎刑如山不留如火纂注蔡氏曰火行山上而不留旅之象也明離象慎用刑艮象不留獄火行不處之象旅瑣瑣志窮災也得童僕貞終無尤也旅焚其次亦以傷矣以旅與下其義喪也以旅之時而與下之道如此義當喪也旅于處未得位也得其資斧心未快也終以譽命上逮也上逮言其譽命聞於上也以旅在上其義焚也喪牛于易終莫之聞也隨風巽君子以申命行事隨相繼之義附録巽風也風之吹物無處不入無物不鼓動詔令之入人淪肌浹髓亦如風之動物也僴纂注蔡氏曰申命重巽象行事風象進退志疑也利武人之貞志治也紛若之吉得中也頻巽之吝志窮也田獲三品有功也九五之吉位正中也巽在牀下上窮也喪其資斧正乎凶也正乎凶言必凶麗澤兊君子以朋友講習兩澤相麗互相滋益朋友講習其象如此纂注蔡氏曰講兊象習重兊象徐氏曰天下之至可說者無如朋友講習講而不習則言語徒詳紬繹無得雖曰為學亦將枯燥生澀而無可嗜之味危殆杌陧而無可即之安矣豈終能恱懌於心乎故必從容論說以講之於先又必切實體驗以習之於後則心與理相涵而所知者益精身與事相安而所能者益固麗澤之益庶乎其有相滋之實而真說在我矣和兊之吉行未疑也居卦之初其說也正未有所疑也纂注蔡氏曰初未牽於隂所行未有疑惑若四比三有商兊之疑矣孚兊之吉信志也纂注程子曰心之所存為志二剛實居中孚信存於中也志存誠信豈至說小人而自失乎是以吉也來兊之凶位不當也九四之喜有慶也孚于剝位正當也與履九五同上六引兊未光也纂注馮氏曰小人欺蔽其君厭然掩其隂柔晦昧之迹卒為陽明之害者皆其心之未光者為之也風行水上渙先王以享于帝立廟皆所以合其散纂注徐氏曰風行水上渙散披離渙之象也先王享帝立廟所以合其渙也此誠敬仁孝之至幽無不格散無不聚故於彖象申言之初六之吉順也渙奔其機得願也渙其躬志在外也渙其羣元吉光大也王居無咎正位也渙其血逺害也澤上有水節君子以制數度議德行纂注蔡氏曰澤容水而有限節之象也制數度節乎外也兊見象議德行節乎內也坎數心亨象程子曰君子觀節之象制立數度所以為節也多寡度法制議德行者存諸中為德發於外為行人之德行當義則中節議謂商度求中節也不出户庭知通塞也纂注蔡氏曰塞謂二剛在前不出門庭凶失時極也纂注丘行可曰前無剛塞可以有行之時也極中也知守位之中而不知失時之中故凶不節之嗟又誰咎也此無咎與諸爻異言無所歸咎也安節之亨承上道也甘節之吉居位中也苦節貞凶其道窮也澤上有風中孚君子以議獄緩死風感水受中孚之象議獄緩死中孚之意附録議獄緩死只是以誠意求之澤上有風感得水動議獄緩死則能感人心淵須是澤中之水海即澤之大者方能相從乎風若溪湍之水其性急流就下風又不奈他何纂注蔡氏曰議獄兊象緩死巽象徐氏曰象言刑獄者五噬嗑賁豐旅中孚離為戈兵有刑獄象又取離明照知情實則刑不濫也中孚厚畫底離噬嗑豐兼取震賁旅兼取艮者明以察其情動以致其決噬嗑去間豐多故非震以動之無以威衆也賁過於文旅不留獄非艮以止之或輕於用刑也蓋獄乃人命所繫一成不可變聖人立象盡意而致其謹審如此愚謂象言刑獄五卦噬嗑豐以其有離之明震之威也賁次噬嗑旅次豐離明不易震皆反為艮矣蓋明貴無時不然威則有時當止至於中孚則全體似離互體有震艮而又兊以議之巽以緩之聖人即象垂教其忠厚惻怛之意見於謹刑如此何其仁哉五卦中文王唯於噬嗑取象夫子即噬嗑賁豐旅中孚以盡其義初九虞吉志未變也其子和之中心願也或鼓或罷位不當也馬匹亡絶類上也有孚攣如位正當也翰音登于天何可長也山上有雷小過君子以行過乎恭喪過乎哀用過乎儉山上有雷其聲小過三者之過皆小者之過可過於小而不可過於大可以小過而不可甚過彖所謂可小事而宜下者也附録聲在髙處是小過之義淵互論大過卦義小過大率是過得不多如大過便說獨立不懼小過只說這行喪用度都只是小事又曰小過是過於慈惠之類大過是剛嚴果毅底氣象僴飛鳥以凶不可如何也不及其君臣不可過也所以不及其君而還遇臣者以臣不可過故也纂注程子曰過之時事無不過其常故於上進則戒及其君臣不可過不可過者臣之分也從或戕之凶如何也弗過遇之位不當也往厲必戒終不可長也爻義未明此亦當闕密雲不雨已上也已上太髙也弗遇過之已亢也水在火上既濟君子以思患而豫防之纂注蔡氏曰思患坎難象豫防離明象曳其輪義無咎也七日得以中道也三年克之憊也附録用兵不得已以髙宗之賢三年而克鬼方亦不勝其憊矣蓋言兵不可輕用也學履終日戒有所疑也東鄰殺牛不如西鄰之時也實受其福吉大來也濡其首厲何可久也火在水上未濟君子以慎辨物居方水火異物各居其所故君子觀象而審辨之纂注蔡氏曰慎坎象辨離象濡其尾亦不知極也極字未詳考上下韻亦不協或恐是敬字今且闕之附録極字或云當作拯字九二貞吉中以行正也九居二本非正以中故得正也未濟征凶位不當也貞吉悔亡志行也君子之光其暉吉也暉者光之散也飲酒濡首亦不知節也易附録纂注卷六
