body:
  text: 易附録纂注卷四元胡一桂撰咸感也釋卦名義纂注丘行可曰咸非訓感咸故感耳凡物兩相對待而後感應之理生故咸有感義又曰咸者感也所以感者心也無心者不能感故咸加心而為感有心於感者亦不能咸感故感無心而為咸惟無容心於感然後無所不感也柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也以卦體卦德卦象釋卦辭或以卦變言柔上剛下之義曰咸自旅來柔上居六剛下居五也亦通纂注蔡氏曰柔上上也坤上交乾而為兊也剛下三也乾下交坤而為艮也馮氏曰柔上剛下感應相與所以為亨止而說所以利貞男下女所以取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣極言感通之理恆久也剛上而柔下雷風相與巽而動剛柔皆應恆以卦體卦象卦德釋卦名義或以卦變言剛上柔下之義曰恆自豐來剛上居二柔下居初也亦通恆亨無咎利貞久於其道也天地之道恆久而不已也恆固能亨且無咎矣然必利於貞乃為久於其道不貞則久非其道矣天地之道所以長久亦以貞而已矣利有攸往終則有始也久於其道終也利有攸往始也動靜相生循環之理然必靜為主也纂注程子曰恆非一定之謂也一定則不能常矣惟隨時變易乃常道也故云利有攸往明理之如是懼人之泥於常也日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恆而天地萬物之情可見矣極言恆久之道遁亨遁而亨也剛當位而應與時行也以九五一爻釋亨義附録遁而亨也分明是說能遁便亨下面更說剛當位而應與時行也是何如曰此所以遁而亨也隂尚微為他剛當位而應所以能知時而遁是能與時待不然便是與時背砥小利貞浸而長也以下二隂釋小利貞附録問小利貞浸而長也是見其浸長故設戒令其貞正且以寬君子之患然亦是他之福曰是如此與否初二兩爻相似砥纂注程子曰聖賢之於天下雖知道之將廢豈肯坐視其亂而不救必區區致力於末極之間强此之衰艱彼之進圖其暫安茍得為之孔孟之所屑為也案語録盤澗問本義釋小利貞與程𫝊不同朱子曰若如程𫝊則於剛當位而應與時行也下當云止而健隂浸而長故小利貞今但言小利貞浸而長也而不言隂進而長則小指隂小之小可知況當遁去之時事勢已有不容正之者程𫝊雖善而有不通矣遁之時義大矣哉隂方浸長處之為難故其時義為尤大也愚謂遁以二隂之長成卦而以四陽之遁得名易為君子謀名卦必以陽為主如是則時義之大亦以陽之能遁為大也大壯大者壯也剛以動故壯釋卦名義以卦體言則陽長過中大者壯也以卦德言則乾剛震動所以壯也大壯利貞大者正也正大而天地之情可見矣釋利貞之義而極言之附録問大者正與正大不同上大字是指陽下正大是說理曰然亦緣上面有大者正字方說此學蒙問如何見天地之情曰正大便見得天地之情天地只是正大未嘗有些子邪處道夫晉進也釋卦名義明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也以卦象卦德卦變釋卦辭纂注丘行可曰明出地上離乘坤也順而麗乎大明坤附離也柔進而上行六自四上行而進于五也大明之君諸侯順附被其寵錫待遇之禮而衆多榮顯也明入地中明夷以卦象釋卦名內文明而外柔順以蒙大難文王以之以卦德釋卦義蒙大難謂遭紂之亂而見囚也利艱貞晦其明也內難而能正其志箕子以之以六五一爻之義釋卦辭內難謂為紂近親在其國內如六五之近於上六也附録文王箕子大槩皆是晦其明然文王之外柔順是本分自然做底箕子晦其眀又曰艱貞是他那佯狂底意思便是艱難底氣象淵纂注橫渠張子曰文王難在外箕子難在內丘行可曰內文明則不失已而詭隨外柔順則不逆時而干禍文王盡全卦之義故以二體言箕子得一爻一義故以六五言家人女正位乎內男正位乎外男女正天地之大義也以卦體九五六二釋利女貞之義愚謂卦以二體言故惟言利女貞而說離分數多彖𫝊就二五言故說男女正而內外爻義兼備又廣彖辭之㫖也家人有嚴君焉父母之謂也亦謂二五父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣上父初子五三夫四二婦五兄三弟以卦畫推之又有此象纂注趙氏曰父義母慈母何以亦稱嚴蓋母之不嚴家之蠧也瀆上下之分庇子弟之過亂內外之别嫚帷薄之儀父雖嚴有不能盡察者必父母尊嚴內外齊肅然後父尊子卑兄友弟恭夫制婦聽各盡其道而後家道正正家而天下定矣睽火動而上澤動而下二女同居其志不同行以卦象釋卦名義說而麗乎明柔進而上行得中而應乎剛是以小事吉以卦德卦變卦體釋卦辭天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉極言其理而贊之纂注程子曰天髙地下其體睽也然陽降隂升相合而化育之事則同也男女異質睽也而相求之志則通也生物萬殊睽也然而得天地之和禀隂陽之氣則相類也物雖異而理本同故天下之大羣生之衆睽散萬殊而聖人為能同之處睽之時合睽之用其事至大故云大矣哉蹇難也險在前也見險而能止知矣哉以卦德釋卦名義而贊其美蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉以卦變卦體釋卦辭而贊其時用之大也愚謂往得中五也其道窮三也利見大人以下皆指五言解險以動動而免乎險解以卦德釋卦名義解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也以卦變釋卦辭坤為衆得衆謂九四入坤體得中有功皆指九二也天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣哉極言而贊其大也附録隂陽之氣閉結之極忽然迸散出做這雷雨只管閉結了若不解散如何㑹有雷雨作小畜所以不能成雨者畜不極也淵損損下益上其道上行以卦體釋卦名義愚謂損內卦乾九三之剛益上卦坤上六之柔而成損是為損下益上主剛而言故曰其道上行損而有孚元吉無咎可貞利有攸往曷之用二簋可用亨二簋應有時損剛益柔有時損益盈虛與時偕行此釋卦辭時謂當損之時附録損上益下曰益損下益上曰損所以然者蓋本厚則邦寧而君安乃所以為益也否則反是僴纂注程子曰有本必有末有實必有文天下萬事無不然者無本不立無文不行父子主恩必有嚴順之體君臣主敬必有承接之儀禮讓存乎內待威儀而後行尊卑有其序非物采則無别文之與實相須而不可闕也及夫文之勝末之流逺本喪實乃當損之時也夫子恐人之泥言也故復明之曰二簋之質用之當有時非所用而用之不可也謂文飾未過而損之與損之至於過甚則非也損剛益柔有時剛為過柔為不足損益皆損剛益柔也必順時而行不當時而損益之則非也益損上益下民說無疆自上下下其道大光以卦體釋卦名義纂注徐氏曰損上益下者損上之剛益下之柔也下卦坤坤柔為民坤得益故民說無疆上乾之下爻下為坤之下爻自上下下也天道下濟而光明其道大光也故為益利有攸往中正有慶利涉大川木道乃行以卦體卦象釋卦辭附録問木字本益字之誤如何曰看來只是木字渙卦說乘木有功中孚說乘木舟虛以此見得淵某見一朋友說有八卦之金木水火土有五行之金木水火土如乾為金易卦之金也兊之金五行之金也巽為木卦中取象也震為木乃東方屬木五行之木也五行取四維也去僞纂注程子曰五以陽剛中正居尊位二復以中正應之是以中正之道益天下天下受其福惠也益動而巽日進無疆天施地生其益無方凡益之道與時偕行動巽二卦之德乾下施坤上生亦上文卦體之義又以此極言贊益之大纂注蔡氏曰無疆以悠久言無方以廣大言與時偕行又言凡益之道當適乎時也程子曰天地之益無窮者理而已矣聖人利益天下之道應時順理與天地合與時偕行也夬決也剛決柔也健而說決而和釋卦名義而贊其德揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也此釋卦辭柔乘五剛以卦體言謂以一小人加于衆君子之上是其罪也剛長乃終謂一變則為純乾也附録彖云利有攸往剛長乃終今人以為陽不能無隂中國不能無夷狄君子不能無小人故小人不可盡去今觀剛長乃終之言則聖人豈不欲小人之盡去耶但所以決之者自有道耳纂注徐氏曰陽剛之長當終於六位不可有未盡之隂也除惡務本君子雖盛不可以小人之勢孤謂無能為不盡去之而存其孽也唐五王不去一武三思而患生於所忽不旋踵而君子之禍烈矣聖人於夬設戒之意蓋深姤遇也柔遇剛也釋卦名附録人日用間誠意十分為善矣或有一分不好底意思潛發以間於其間此意一發便由邪徑以長姤一隂生五陽便立不住了以此見凡於一事一念之微茍有不善之當防皆不可忽大雅勿用取女不可與長也釋卦辭纂注程子曰取女者欲長久而成家也漸長之隂將消於陽不可與之長久也凡女子小人夷狄勢茍漸盛何可與久故戒勿用取如是之女天地相遇品物咸章也以卦體言愚謂以乾遇巽巽得坤初爻而成故有天地相遇之象又巽為東南之卦萬物潔齊之時故有品物咸章之象剛遇中正天下大行也指九五附録姤不是好底卦然天地相遇以下却又甚好蓋天地相遇又自别取一義剛遇中正只取九五或謂亦以九二言非也銖姤之時義大矣哉幾微之際聖人所謹附録上面說天地相遇至天下大行正是好時節而不好之漸已生於微矣故當謹於此學蒙纂注程子曰天地不相遇則萬物不生君臣不相遇則政治不興聖賢不相遇則道德不亨事物不相遇則功用不成姤之時與義皆甚大也萃聚也順以說剛中而應故聚也以卦德卦體釋卦名義王假有廟致孝亨也利見大人亨聚以正也用大牲吉利有攸往順天命也釋卦辭附録順天命伊川說萃時若不用大牲便是那以天下儉其親相似也有此理這時節比不得那利用禴之事觀其所聚而天地萬物之情可見矣極言其理而贊之纂注徐氏曰天地萬物髙下散殊感則見其情之通恆則見其情之久聚則見其情之同不于其聚而觀之情之一者不可得而見矣柔以時升以卦變釋卦名巽而順剛中而應是以大亨以卦德卦體釋卦辭愚謂易以陽為大巽順不足以大亨必剛中而應是以大亨大亨之功非剛中之九二上應六五則不能致也用見大人勿恤有慶也南征吉志行也困剛掩也以卦體釋卦名險以說困而不失其所亨其唯君子乎貞大人吉以剛中也有言不信尚口乃窮也以卦德卦體釋卦辭愚謂剛中指二五口兊象上六為兊之主居窮極之地故有尚口乃窮之象巽乎水而上水井井養而不窮也以卦象釋卦名義改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也以卦體釋卦辭無喪無得往來井井兩句意與不改井同故不復出剛中以二五而言未有功而敗其瓶所以凶也纂注朝氏曰或謂彖主三陽言五井冽寒泉食是陽剛居得中正邑可改而井不可改也三井泄不食是水未見於用未有功也二甕敝漏是既不得水并其瓶而亡之羸其瓶而凶者也革水火相息二女同居其志不相得曰革以卦象釋卦名義大略與睽相似然以相違而為睽相息而為革也息滅息也又為生息之義滅息而後生息也纂注金陵王氏曰澤火非如坎離有隂陽相運之道其相遇則相息而已其相息也唯勝者能革其不勝者耳已日乃孚革而信之文明以說大亨以正革而當其悔乃亡以卦德釋卦辭纂注程子曰離為文明兊為說文明則理無不盡事無不察說則人心和順革而能照察事理和順人心可致大亨而得貞正如是變革得其至當故悔亡也天地革而四時成湯武革命順乎天而應乎人革之時大矣哉極言而贊其大附録革是更革之謂須是翻轉更變一畨所謂上下與天地同流豈曰小補之哉小補之者謂扶衰救弊逐些補緝如錮露家事相似若是更革則須徹底重新鑄造非止補苴罅漏而已湯武順天應人是如此通論兊卦易言順天應人後來盡說應天順人非也又曰順天應人革就革命上說言順天理應人心胡致堂管見中辨得好愚案梁武帝受禪顔見逺不食卒帝曰我自應天從人何預士夫事管見曰易之革曰湯武革命順乎天而應乎人未聞應乎天也應者對感而言人事作於下則天理應乎上豈曰天感乎上而人應乎下歟為是言者不知天之為天矣故易惟曰順乎天順乎天者順理也後世務名不務實以兵取國者曰吾應天順人也相承而罔察至以為尊號其失逺矣鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢以卦體二象釋卦名義因極其大而言之亨帝貴誠用犢而已養賢則饔飱牢禮當極其盛故曰大亨纂注蔡氏曰亨飪鼎之用也變腥而為熟易堅而為柔亨飪不過祭祀賔客二事而祭之大者無出於上帝賔客之重者無過於聖賢巽而耳目聰明柔進而上行得中而應乎剛是以元亨以卦象卦變卦體釋卦辭纂注程子曰離明而中虛於上為耳目聰明之象震亨震有亨道不待言也震來虩虩恐致福也笑言啞啞後有則也恐致福恐懼以致福也則法也震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也程子以為邇也下脫不喪匕鬯四字今從之出謂繼世而主祭也或云出即鬯字之誤艮止也時止則止時行則行動靜不失其時其道光明此釋卦名艮之義則止也然行止各有其時故時止而止止也時行而行亦止也艮體篤實故又有光明之義大畜於艮亦以輝光言附録行固非止然行而不失其理乃所止也僴問艮之象何以為光明曰定則明凡人胸次煩擾則愈見昏昧中有定止則自然光明莊子所謂泰宇定則天光發是也學蒙愚謂艮一陽見於二隂之上陽明著見隂莫得而掩蔽之故艮獨稱光明艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也此釋卦辭易背為止以明背即止也背者止之所也以卦體言內外之卦隂陽敵應而不相與也不相與則內不見己外不見人而無咎矣朝氏云艮其止當依卦辭作背附録八純卦皆不相與只是艮卦是止尤不相與內不見己是內卦外不見人是外卦兩卦各自去淵漸之進也女歸吉也之字疑衍或是漸字進得位往有功也進以正可以正邦也以卦變釋利貞之意蓋此卦之變自渙而來九進居三自旅而來九進居五皆為得位之正其位剛得中也以卦體言謂九五止而巽動不窮也以卦德言漸進之義纂注程子曰內艮止外巽順止為安靜之象巽為和順之義人之進也若以欲心之動則躁而不得其漸故有困窮在漸之義內止靜而外巽順故其進動不有困窮也歸妹天地之大義也天地不交而萬物不興歸妹人之終始也釋卦名義也歸者女之終生育者人之始纂注程子曰天地不交則萬物何從而生女之歸男乃生生相續之道男女交而後有生息有生息而後其終不窮前者有終而後者有始相續不窮是人之終始也說以動所歸妹也又以卦德言之附録歸妹未有不好只是說以動帶纍他征凶位不當也無攸利柔乘剛也又以卦體釋卦辭男女之交本皆正理惟若此卦則不得其正也纂注程子曰歸妹諸爻皆不當位又有乘剛之過二五皆乘剛男女有尊卑之序夫婦有倡隨之禮此常理也如恆是也茍不有常正之道徇情肆欲唯說是動則夫婦瀆亂男牽欲而失其剛婦紐說而忘其順如歸妹之乘剛是也所以凶無往而利也愚謂動而說為隨此陽倡而隂和男行而女從得男女之正故元亨利貞說以動為歸妹則是隂反先倡而陽和女反先行而男從失男女之正故征凶無攸利柔乘剛柔謂三五剛謂二四皆隂陽失位也豐大也明以動故豐以卦德釋卦名義附録明以動故豐以明心應事物非明則動無所之非動則明無所用僴徒明不行則明無所用空明而已徒行不明則行無所向冥行而已伯羽王假之尚大也勿憂宜日中宜照天下也釋卦辭附録王假之尚大也只是王者至此極大底時節所尚者皆大事僴問君德如日之中乃能盡照天下否曰易如此看不得只是如日之中則自然照天下却不可將作道理解他僴日中則昃月盈則食天地盈虛與時消息而況於人乎況於鬼神乎此又發明卦辭外意言不可過中也附録物到盛時必衰雖鬼神有所不能違也僴天地是舉其全體而言鬼神是指其中運動變化者通上徹下而言如雨風露雷草木之類皆是又曰豐卦彖許多言語其實則在日中則昃月盈則食天地盈虛與時消息數語上這盛得極常須謹守得日中時候方得不然偃仆傾壞了又曰這處去危亡只是一間耳須是兢兢如奉槃水方得又曰這便是康節所謂酩酊離披時候如何不憂懼謹畏宣政間有以奢侈為言者小人都云當豐亨豫大之時須是恁地奢泰方得所以一向放肆如何得不亂學蒙旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也以卦體卦德釋卦辭旅之時義大矣哉旅之時為難處纂注徐氏曰一柔在外而處二剛之中是羈旅之人交於强有力者茍非善處卑則取辱髙則招禍鮮不失矣惟於止知其所止無私交無暗事非賢不主非善不與止而麗乎明也夫如是內不失已外不失人雖在旅困亦可小亨得旅之正而吉也重巽以申命釋卦義也巽順而入必究乎下命令之象重巽故為申命也附録巽是重卦故曰重巽八卦之象皆如此僴申字是叮嚀反復之意風無所不入如命令之叮嚀告戒無所不至故象以之學蒙剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人以卦體釋卦辭剛巽乎中正而志行指九五柔謂初四兊說也釋卦名義剛中而柔外說以利貞是以順乎天而應乎人說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉以卦體釋卦辭而極言之附録說若不是剛中便是違道干譽便成邪媚下面許多道理都從這箇剛中柔外來淵纂注徐氏曰剛中二五也柔外三上也剛中而柔外則立己者正而說人者非邪矣程子曰陽剛居中中心誠實之象柔爻在外接物和柔之象故為說利貞說之以道宜正也說而能貞是以上順天理下應人心說道之至正至善者也若夫違道以干百姓之譽者茍取一時之說耳非君子之正道也君子之道其說於民如天地之施感於其心而說服無斁故以之先民則民心悅隨而忘其勞率之以犯難則民心說服於義而不恤其死說道之大民莫不知勸勸謂信之而勉力順從渙亨剛來而不窮柔得位乎外而上同以卦變釋卦辭附録剛來而不窮是居位得中若在下則窮矣學蒙剛來而不窮是九三來做二柔得位而上同是六二上做三此說有些不穩却為是六三不喚做得位愚謂本義以卦變自漸來故指柔為三三却未為得位蔡氏指柔為四則四正得位外謂外卦上同謂上同於五似為得之王假有廟王乃在中也中謂廟中附録此卦只是卜祭吉又更宜涉川王乃在中是指廟中言王指九五言宜在廟祭祀淵利涉大川乘木有功也節亨剛柔分而剛得中以卦體釋卦辭愚謂下體本乾分三剛上而為五上體本坤分五柔下而為三是剛上而得五之中也苦節不可貞其道窮也又以理言說以行險當位以節中正以通又以卦德卦體言之當位中正指五又坎為通附録說以行險程說是也說則欲進而有險在前進去不得故有節止之義又曰節便是阻節之意坎為通水在中間流而不止也纂注程子曰人於所說則不知己遇艱險則思止方說而止為節之義當位以節五居尊位主節者也處得中正節而能通也中正則通過則苦矣又曰以剛中正為節如懲忿窒欲損過折有餘是也不正之節如嗇節於用懦節於行是也天地節而四時成節以制度不傷財不害民極言節道附録天地節而四時成天地轉來到這裏相節了更沒去處今年冬盡了明年又是春夏秋冬到這裏厮匝了更去不得這箇拆做兩截兩截又拆做四截便是春夏秋冬他是自然之節初無人使他聖人則因其自然之節而節之如修道之謂教天秩有禮之類皆是天地則和這箇都無只是自然如此聖人法天做這許多節指出來淵中孚柔在內而剛得中說而巽孚乃化邦也以卦體卦德釋卦名義附録柔在內而剛得中這箇是就全體看則中虛就二體看則中實他都見得有孚信之意故喚作中孚伊川此二句却說得好豚魚吉信及豚魚也利涉大川乘木舟虛也以卦象言纂注吳氏曰先儒以豚魚為二物實一物耳蓋兊澤巽風豚魚生於澤而主風古云江豚魚出而風今江湖行舟之人見江豚作則知風之至天下之物皆有自然之信凡天機之觸天籟之鳴非物能然也皆天理之真天道之妙流行貫通在物有不能違耳中孚以利貞乃應乎天也信而正則應乎天矣小過小者過而亨也以卦體釋卦名義與其辭過以利貞與時行也柔得中是以小事吉也以二五言剛失位而不中是以不可大事也以三四言有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也以卦體言附録行過恭用過儉皆是宜下之意輝纂注蔡氏曰卦體有飛鳥之象中二爻象身上下四爻象翼上逆而下順隂之道也既濟亨小者亨也濟下疑脫小字利貞剛柔正而位當也以卦體言初吉柔得中也指六二終止則亂其道窮也纂注程子曰天下之事不進則退無一定之理濟之終不濟而止矣無常止也衰亂至矣蓋其道已窮極也九五之才非不善也時極道窮理當必變也聖人至此奈何曰唯聖人為能通其變於未窮不使至於極也堯舜是也故有終而無亂邱行可曰人之常情處無事則止心生止則心有所怠而不復進此亂之所從起處多事則戒心生戒則心有所畏而不敢肆此治之所由兆治亂者天也所以制其治亂者人也彖曰終亂而傳曰終止則亂止則亂矣不止亂安從生玩止一辭則知夫子有功於贊易也未濟亨柔得中也指六五言附録問未濟所以亨者便是有濟之理而柔得中又有亨之道曰然學履小狐汔濟未出中也濡其尾無攸利不續終也附録汔字訓幾與井卦同既曰幾便是未濟未出中不獨是說九二通一卦之體皆是未出乎坎險所以未濟學履不續終也是首濟而尾濡不能濟不相接續去故曰不續終也狐尾大濡其尾則濟不得矣雖不當位剛柔應也纂注馮氏曰六爻雖不當位而剛柔皆應茍能協力以濟亦可致亨未濟者終濟矣易附録纂注卷四
